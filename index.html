<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Tiệm Nhà Mị</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100">

    <div class="max-w-md mx-auto bg-white min-h-screen pb-32">
        <div class="bg-white shadow-sm">
            <div class="relative">
                <img src="assets/banner.jpg" class="w-full h-40 object-cover" onerror="this.src='https://placehold.co/600x200?text=Tiem+Nha+Mi'">
                <div class="absolute inset-0 bg-black/10"></div>
            </div>

            <div class="relative px-4 pb-4">
                <div class="flex flex-col items-center -translate-y-10">
                    <img src="assets/logo.jpg" class="w-24 h-24 rounded-full border-4 border-white bg-white shadow-lg object-cover" onerror="this.src='https://placehold.co/100'">
                    <h1 class="text-3xl font-bold text-green-700 mt-2 text-center">Tiệm Nhà Mị</h1>
                    <p class="text-pink-500 text-xs font-semibold tracking-wider uppercase mt-1">✨ Vị ngon trên từng ngụm ✨</p>
                </div>

                <div id="categoriesContainer" class="flex gap-2 overflow-x-auto pb-2 -translate-y-4 scrollbar-none">
                    </div>
            </div>
        </div>

        <div class="px-4 mt-4">
            <div id="menuItemsContainer" class="grid grid-cols-1 gap-4">
                </div>
        </div>
    </div>

    <div id="cartBar" class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-slate-100 shadow-[0_-4px_12px_rgba(0,0,0,0.05)] p-4 z-40 hidden rounded-t-3xl">
        <div class="flex items-center justify-between">
            <div onclick="openCartModal()" class="flex items-center gap-3 cursor-pointer">
                <div class="relative bg-green-100 p-3 rounded-2xl text-xl">
                    🛍️
                    <span id="cartCount" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center font-mono">0</span>
                </div>
                <div>
                    <span class="text-[10px] text-slate-400 block font-medium">Tổng tiền tạm tính</span>
                    <span id="cartTotal" class="text-lg font-black text-slate-900 font-mono">0đ</span>
                </div>
            </div>
            <button onclick="openOrderModal()" class="bg-green-700 text-white text-xs font-bold px-6 py-3.5 rounded-xl hover:bg-green-800 transition active:scale-95 shadow-md shadow-green-700/20 uppercase tracking-wider">
                XÁC NHẬN ĐƠN
            </button>
        </div>
    </div>

    <div id="optionModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-end justify-center p-0 hidden">
        <div class="bg-white w-full max-w-md rounded-t-3xl p-6 space-y-6 animate-slide-up shadow-2xl">
            <div class="flex justify-between items-start">
                <div>
                    <h3 id="modalItemName" class="font-black text-slate-900 text-lg">Tên món uống</h3>
                    <p id="modalItemPrice" class="text-green-700 font-bold text-sm font-mono mt-0.5">0đ</p>
                </div>
                <button onclick="closeOptionModal()" class="text-slate-400 bg-slate-100 hover:bg-slate-200 w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm transition">✕</button>
            </div>
            <input type="hidden" id="modalItemId">
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-2">🍭 Mức đường</label>
                    <div class="grid grid-cols-3 gap-2" id="sugarOptions">
                        <button onclick="selectOption('sugar','100%')" class="py-2.5 text-xs font-bold border rounded-xl transition shadow-sm">100% Đường</button>
                        <button onclick="selectOption('sugar','50%')" class="py-2.5 text-xs font-bold border rounded-xl transition shadow-sm">50% Đường</button>
                        <button onclick="selectOption('sugar','0%')" class="py-2.5 text-xs font-bold border rounded-xl transition shadow-sm">Không Đường</button>
                    </div>
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-2">❄️ Mức đá</label>
                    <div class="grid grid-cols-3 gap-2" id="iceOptions">
                        <button onclick="selectOption('ice','100%')" class="py-2.5 text-xs font-bold border rounded-xl transition shadow-sm">100% Đá</button>
                        <button onclick="selectOption('ice','50%')" class="py-2.5 text-xs font-bold border rounded-xl transition shadow-sm">50% Đá</button>
                        <button onclick="selectOption('ice','0%')" class="py-2.5 text-xs font-bold border rounded-xl transition shadow-sm">Không Đá</button>
                    </div>
                </div>
            </div>
            <button onclick="saveOptions()" class="w-full bg-green-700 text-white font-bold text-sm py-4 rounded-xl hover:bg-green-800 transition active:scale-95 shadow-md shadow-green-700/20 uppercase tracking-wide">XÁC NHẬN CHỌN</button>
        </div>
    </div>

    <div id="orderModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-sm rounded-2xl p-5 space-y-4 shadow-2xl border border-slate-100">
            <div class="flex justify-between items-center">
                <h3 class="font-bold text-slate-900 text-base uppercase tracking-wide text-green-700">Thông Tin Đặt Hàng</h3>
                <button onclick="closeOrderModal()" class="text-slate-400 hover:text-slate-600 font-bold text-sm">✕</button>
            </div>
            <div class="space-y-3">
                <div>
                    <label class="text-[11px] font-bold text-slate-400 uppercase block mb-1">Tên của bạn <span class="text-red-500">*</span></label>
                    <input id="customerName" type="text" placeholder="Nhập tên người nhận..." class="w-full border border-slate-200 rounded-xl p-3 text-sm outline-none focus:border-green-700">
                </div>
                <div>
                    <label class="text-[11px] font-bold text-slate-400 uppercase block mb-1">Số điện thoại <span class="text-red-500">*</span></label>
                    <input id="customerPhone" type="tel" placeholder="Nhập số điện thoại..." class="w-full border border-slate-200 rounded-xl p-3 text-sm outline-none focus:border-green-700 font-mono">
                </div>
                <div>
                    <label class="text-[11px] font-bold text-slate-400 uppercase block mb-1">Ghi chú thêm</label>
                    <input id="orderNote" type="text" placeholder="Ví dụ: Ít ngọt, giao tận nơi..." class="w-full border border-slate-200 rounded-xl p-3 text-sm outline-none focus:border-green-700">
                </div>
            </div>
            <button onclick="submitOrder()" class="w-full bg-green-700 text-white font-bold text-xs py-3.5 rounded-xl hover:bg-green-800 transition active:scale-95 shadow-md uppercase tracking-wide">GỬI ĐƠN ĐẾN QUẦY</button>
        </div>
    </div>

    <div id="cartModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 flex items-end justify-center p-0 hidden">
        <div class="bg-white w-full max-w-md rounded-t-3xl p-5 space-y-4 shadow-2xl max-h-[75vh] flex flex-col">
            <div class="flex justify-between items-center border-b border-slate-100 pb-3">
                <h3 class="font-black text-slate-900 text-base">Món uống đã chọn</h3>
                <button onclick="closeCartModal()" class="text-slate-400 text-xs font-bold bg-slate-100 px-3 py-1.5 rounded-full hover:bg-slate-200">Đóng</button>
            </div>
            <div id="cartItemsList" class="overflow-y-auto flex-1 space-y-3 pr-1">
                </div>
        </div>
    </div>

    <div id="successModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white p-6 rounded-2xl max-w-sm w-full text-center shadow-2xl border border-slate-100">
            <div class="text-4xl mb-2">🎉</div>
            <h2 class="text-lg font-bold text-green-700 uppercase tracking-wide">Đặt Đồ Uống Thành Công!</h2>
            <p class="text-slate-500 text-xs mt-1">Đơn hàng của bạn đã được gửi đến quầy pha chế Tiệm Nhà Mị.</p>
            <button onclick="closeSuccess()" class="mt-5 w-full bg-slate-900 text-white font-bold text-xs py-3 rounded-xl hover:bg-slate-800 transition">ĐỒNG Ý</button>
        </div>
    </div>

    <script>
        const BACKEND_URL = "https://drink-order-backend.onrender.com";
        let menu = [];
        let categories = ["Cà phê", "Trà sữa", "Trà trái cây", "Nước ép"];
        let currentCategory = "Cà phê";
        let cart = {};

        async function loadMenu() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/menu`);
                menu = await response.json();

                const uniqueCategories = [...new Set(menu.map(item => item.category).filter(Boolean))];
                if (uniqueCategories.length > 0) {
                    categories = uniqueCategories;
                    currentCategory = categories[0];
                }

                cart = {};
                menu.forEach(item => {
                    const isTopping = item.name.toLowerCase().includes("thêm") || item.name.toLowerCase().includes("topping");
                    cart[item.id] = [{ 
                        qty: 0, 
                        sugar: isTopping ? "" : "100%", 
                        ice: isTopping ? "" : "100%", 
                        note: "" 
                    }];
                });

                if (localStorage.getItem("customer_name")) document.getElementById("customerName").value = localStorage.getItem("customer_name");
                if (localStorage.getItem("customer_phone")) document.getElementById("customerPhone").value = localStorage.getItem("customer_phone");

                render();
            } catch (error) {
                console.error("Lỗi tải menu:", error);
            }
        }

        // ✨ HÀM RENDER ĐÃ ĐƯỢC THÊM TIÊU ĐỀ DANH MỤC THEO ẢNH ĐÍNH KÈM
        function render() {
            // 1. Vẽ thanh tab danh mục nằm ngang phía trên như cũ
            const catContainer = document.getElementById("categoriesContainer");
            catContainer.innerHTML = categories.map(cat => {
                const isSelected = cat === currentCategory;
                return `
                    <button onclick="currentCategory='${cat}'; render();" 
                        class="px-5 py-2.5 text-xs font-bold rounded-full whitespace-nowrap transition
                        ${isSelected ? 'bg-green-700 text-white shadow-sm font-extrabold' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}">
                        ${cat}
                    </button>
                `;
            }).join("");

            // 2. Lọc các món thuộc danh mục đang chọn
            const itemsContainer = document.getElementById("menuItemsContainer");
            const filteredItems = menu.filter(item => item.category === currentCategory);

            if (filteredItems.length === 0) {
                itemsContainer.innerHTML = `<div class="text-center text-xs text-slate-400 py-8 italic">Chưa có món uống nào trong danh mục này.</div>`;
            } else {
                // Thêm tiêu đề viết hoa tên danh mục ở ngay trên đầu khối danh sách món uống
                let htmlContent = `
                    <div class="mb-1">
                        <h2 class="text-base font-extrabold text-green-700 uppercase tracking-wider border-l-4 border-green-700 pl-2">
                            ${currentCategory}
                        </h2>
                    </div>
                `;

                // Cộng dồn HTML danh sách các món ăn bên dưới tiêu đề
                htmlContent += filteredItems.map(item => {
                    const isTopping = item.name.toLowerCase().includes("thêm") || item.name.toLowerCase().includes("topping");
                    const config = cart[item.id]?.[0] || { qty: 0, sugar: isTopping ? "" : "100%", ice: isTopping ? "" : "100%" };

                    return `
                        <div class="bg-white p-3 rounded-2xl border border-slate-100 shadow-sm flex gap-3 hover:border-slate-200 transition">
                            <img src="${item.image}" class="w-20 h-20 rounded-xl object-cover bg-slate-50 border border-slate-100 flex-shrink-0" onerror="this.src='https://placehold.co/100'">
                            <div class="flex-1 flex flex-col justify-between">
                                <div>
                                    <h3 class="font-bold text-slate-900 text-sm leading-tight">${item.name}</h3>
                                    <p class="text-green-700 font-extrabold text-sm mt-1 font-mono">${Number(item.price).toLocaleString("vi-VN")}đ</p>
                                </div>
                                
                                <div class="flex items-center justify-between mt-2">
                                    ${!isTopping ? `
                                        <button onclick="openOptionModal(${item.id})" class="text-[10px] bg-slate-100 text-slate-600 hover:bg-slate-200 font-bold px-2 py-1 rounded-md border border-slate-200 transition">
                                            ⚙️ Đường/Đá ${config.qty > 0 ? `(${config.sugar}/${config.ice})` : ''}
                                        </button>
                                    ` : `<div></div>`}

                                    <div class="flex items-center gap-2 bg-slate-50 p-0.5 rounded-lg border border-slate-200">
                                        <button onclick="updateQty(${item.id}, -1)" class="w-6 h-6 rounded-md bg-white border border-slate-200 flex items-center justify-center text-xs font-bold text-slate-600 hover:bg-slate-100 active:scale-95 transition">-</button>
                                        <span class="w-5 text-center text-xs font-bold text-slate-800 font-mono">${config.qty}</span>
                                        <button onclick="updateQty(${item.id}, 1)" class="w-6 h-6 rounded-md bg-green-700 flex items-center justify-center text-xs font-bold text-white hover:bg-green-800 active:scale-95 transition">+</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join("");

                itemsContainer.innerHTML = htmlContent;
            }

            // 3. Đồng bộ thanh hiển thị tổng tiền giỏ hàng phía dưới như cũ
            updateCartBar();
        }

        function updateQty(id, change) {
            if (!cart[id]) {
                const item = menu.find(x => x.id === id);
                const isTopping = item?.name.toLowerCase().includes("thêm") || item?.name.toLowerCase().includes("topping");
                cart[id] = [{ qty: 0, sugar: isTopping ? "" : "100%", ice: isTopping ? "" : "100%", note: "" }];
            }
            let newQty = cart[id][0].qty + change;
            if (newQty < 0) newQty = 0;
            cart[id][0].qty = newQty;
            render();
        }

        function updateCartBar() {
            let totalItems = 0;
            let totalPrice = 0;

            menu.forEach(item => {
                const config = cart[item.id]?.[0];
                if (config && config.qty > 0) {
                    totalItems += config.qty;
                    totalPrice += config.qty * item.price;
                }
            });

            const bar = document.getElementById("cartBar");
            if (totalItems > 0) {
                bar.classList.remove("hidden");
                document.getElementById("cartCount").innerText = totalItems;
                document.getElementById("cartTotal").innerText = totalPrice.toLocaleString("vi-VN") + "đ";
            } else {
                bar.classList.add("hidden");
            }
        }

        // --- QUẢN LÝ MODAL TÙY CHỌN ĐƯỜNG/ĐÁ ---
        let tempSugar = "100%";
        let tempIce = "100%";

        function openOptionModal(id) {
            const item = menu.find(x => x.id === id);
            if (!item) return;

            document.getElementById("modalItemId").value = id;
            document.getElementById("modalItemName").innerText = item.name;
            document.getElementById("modalItemPrice").innerText = item.price.toLocaleString("vi-VN") + "đ";

            const config = cart[id][0];
            tempSugar = config.sugar || "100%";
            tempIce = config.ice || "100%";

            highlightOption('sugar', tempSugar);
            highlightOption('ice', tempIce);

            document.getElementById("optionModal").classList.remove("hidden");
        }

        function closeOptionModal() { document.getElementById("optionModal").classList.add("hidden"); }

        function selectOption(type, value) {
            if (type === 'sugar') tempSugar = value;
            if (type === 'ice') tempIce = value;
            highlightOption(type, value);
        }

        function highlightOption(type, value) {
            const container = document.getElementById(`${type}Options`);
            const buttons = container.getElementsByTagName('button');
            for (let btn of buttons) {
                if (btn.innerText.includes(value)) {
                    btn.className = "py-2.5 text-xs font-bold border rounded-xl transition shadow-sm bg-green-700 text-white border-green-700";
                } else {
                    btn.className = "py-2.5 text-xs font-bold border rounded-xl transition shadow-sm bg-slate-50 text-slate-600 border-slate-200 hover:bg-slate-100";
                }
            }
        }

        function saveOptions() {
            const id = document.getElementById("modalItemId").value;
            if (cart[id]) {
                cart[id][0].sugar = tempSugar;
                cart[id][0].ice = tempIce;
                if (cart[id][0].qty === 0) cart[id][0].qty = 1;
            }
            closeOptionModal();
            render();
        }

        // --- CHI TIẾT GIỎ HÀNG NỔI ---
        function openCartModal() {
            const list = document.getElementById("cartItemsList");
            list.innerHTML = "";

            let hasItem = false;
            menu.forEach(item => {
                const config = cart[item.id]?.[0];
                if (config && config.qty > 0) {
                    hasItem = true;
                    list.innerHTML += `
                        <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-100">
                            <div>
                                <h4 class="font-bold text-slate-800 text-sm">${item.name}</h4>
                                <span class="text-[10px] text-slate-500 font-medium">${config.sugar ? `🍬 ${config.sugar}` : ''} ${config.ice ? `| ❄️ ${config.ice}` : ''}</span>
                                <span class="text-xs font-mono font-bold text-green-700 block mt-0.5">${(item.price * config.qty).toLocaleString("vi-VN")}đ</span>
                            </div>
                            <div class="flex items-center gap-2 bg-white p-0.5 rounded-lg border border-slate-200">
                                <button onclick="updateQty(${item.id}, -1); openCartModal();" class="w-6 h-6 rounded-md bg-slate-50 border border-slate-200 flex items-center justify-center text-xs font-bold text-slate-600">-</button>
                                <span class="w-4 text-center text-xs font-bold font-mono">${config.qty}</span>
                                <button onclick="updateQty(${item.id}, 1); openCartModal();" class="w-6 h-6 rounded-md bg-green-700 flex items-center justify-center text-xs font-bold text-white">+</button>
                            </div>
                        </div>
                    `;
                }
            });

            if (!hasItem) { closeCartModal(); return; }
            document.getElementById("cartModal").classList.remove("hidden");
        }

        function closeCartModal() { document.getElementById("cartModal").classList.add("hidden"); }

        // --- GỬI ĐƠN HÀNG ---
        function openOrderModal() { document.getElementById("orderModal").classList.remove("hidden"); }
        function closeOrderModal() { document.getElementById("orderModal").classList.add("hidden"); }

        async function submitOrder() {
            const customer = document.getElementById("customerName").value.trim();
            const phone = document.getElementById("customerPhone").value.trim();
            const note = document.getElementById("orderNote").value.trim();

            if (!customer || !phone) { alert("❌ Vui lòng nhập đầy đủ Tên và Số điện thoại!"); return; }

            let items = [];
            let total = 0;

            menu.forEach(item => {
                const config = cart[item.id]?.[0];
                if (config && config.qty > 0) {
                    items.push({
                        id: item.id,
                        name: item.name,
                        qty: config.qty,
                        sugar: config.sugar,
                        ice: config.ice,
                        price: item.price
                    });
                    total += item.price * config.qty;
                }
            });

            if (items.length === 0) { alert("Giỏ hàng của bạn đang trống!"); return; }

            const payload = { customer_name: customer, phone, items: JSON.stringify(items), note, total, status: "Đã nhận" };

            try {
                const response = await fetch(`${BACKEND_URL}/api/orders`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error("Gửi đơn lỗi");

                localStorage.setItem("customer_name", customer);
                localStorage.setItem("customer_phone", phone);

                closeOrderModal();
                closeCartModal();
                showSuccess();

                document.getElementById("orderNote").value = "";
                loadMenu();
            } catch (error) {
                alert("❌ Gửi đơn thất bại, vui lòng thử lại!");
            }
        }

        function showSuccess() { document.getElementById("successModal").classList.remove("hidden"); }
        function closeSuccess() { document.getElementById("successModal").classList.add("hidden"); }

        loadMenu();
    </script>
</body>

</html>
