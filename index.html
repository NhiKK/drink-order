<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Tiệm Nhà Mị - Đặt Món Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100">

    <div class="max-w-md mx-auto bg-white min-h-screen pb-32">
        <div class="bg-white shadow-sm">
            <div class="relative">
                <img src="assets/banner.jpg" class="w-full h-40 object-cover" onerror="this.src='https://placehold.co/600x200?text=Tiem+Nha+Mi'">
                <div class="absolute inset-0 bg-black/10"></div>
            </div>

            <div class="relative px-4 pb-4">
                <div class="flex flex-col items-center -translate-y-10">
                    <img src="assets/logo.jpg" class="w-24 h-24 rounded-full border-4 border-white bg-white shadow-lg object-cover" onerror="this.src='https://placehold.co/100'">
                    <h1 class="text-3xl font-bold text-green-700 mt-2 text-center">Tiệm Nhà Mị</h1>
                    <p class="text-slate-500 text-xs mt-1 text-center font-medium">✨ Hương vị thanh mát • Giao hàng tận nơi ✨</p>
                </div>
            </div>
        </div>

        <div class="px-4 -mt-4 mb-6">
            <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 space-y-3">
                <h3 class="font-bold text-slate-800 text-sm flex items-center gap-1.5">👤 Thông tin giao hàng</h3>
                <div class="grid grid-cols-2 gap-2">
                    <input id="custName" type="text" placeholder="Tên của bạn..." class="w-full bg-white border border-slate-200 rounded-xl p-2.5 text-xs outline-none focus:border-green-600 font-medium">
                    <input id="custPhone" type="tel" placeholder="Số điện thoại..." class="w-full bg-white border border-slate-200 rounded-xl p-2.5 text-xs outline-none focus:border-green-600 font-medium">
                </div>
            </div>
        </div>

        <div class="px-4 mb-4">
            <div id="categoryTabs" class="flex gap-2 overflow-x-auto pb-2 scrollbar-none">
                </div>
        </div>

        <div class="px-4 space-y-3" id="menuList">
            <div class="text-center py-10 text-slate-400 italic">Đang tải danh sách món uống...</div>
        </div>
    </div>

    <div id="cartSection" class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-slate-200 shadow-2xl rounded-t-2xl z-40 hidden transition-all duration-300">
        
        <div onclick="toggleCartExpand()" class="flex justify-between items-center px-4 py-3 bg-slate-50 rounded-t-2xl border-b border-slate-100 cursor-pointer select-none">
            <div class="flex items-center gap-2">
                <span class="text-xl">🛍️</span>
                <span class="text-xs font-bold text-slate-700">Giỏ hàng của bạn (<span id="cartCountBadge" class="text-green-600 font-extrabold">0</span> món)</span>
            </div>
            <span id="cartToggleArrow" class="text-xs font-bold text-slate-400 bg-white border border-slate-200 px-2 py-1 rounded-lg shadow-sm transition-transform">
                Xem chi tiết 🔼
            </span>
        </div>

        <div id="cartDetailsBox" class="hidden max-h-60 overflow-y-auto p-4 space-y-3">
            <div id="cartItemsList" class="space-y-3"></div>
            
            <div class="pt-2 border-t border-slate-100">
                <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider block mb-1">📌 Ghi chú đặc biệt cho quán</label>
                <input id="orderNote" type="text" placeholder="Ví dụ: Ít ngọt, giao giờ hành chính, không lấy ống hút..." class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-xs outline-none focus:border-green-600 font-medium">
            </div>
        </div>

        <div class="p-4 bg-white border-t border-slate-100 flex items-center justify-between gap-4">
            <div>
                <span class="text-[10px] block font-bold text-slate-400 uppercase tracking-wider">Tổng cộng</span>
                <span id="cartTotalPrice" class="text-xl font-black text-slate-900 font-mono">0đ</span>
            </div>
            <button onclick="submitOrder()" class="flex-1 bg-green-700 text-white font-bold text-sm py-3.5 px-4 rounded-xl shadow-lg shadow-green-700/20 hover:bg-green-800 transition active:scale-95 text-center">
                XÁC NHẬN ĐẶT ĐƠN
            </button>
        </div>
    </div>

    <div id="successModal" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-3xl p-6 text-center max-w-sm w-full shadow-2xl border border-slate-100">
            <div class="w-16 h-16 bg-green-50 text-green-600 rounded-full flex items-center justify-center text-3xl mx-auto mb-4">🎉</div>
            <h2 class="text-xl font-black text-slate-900">Đặt món thành công!</h2>
            <p class="text-slate-500 text-xs mt-1 leading-relaxed">Đơn hàng của bạn đã gửi đến quầy pha chế.<br>Tiệm sẽ liên hệ giao hàng ngay nha quý khách ơi!</p>
            <button onclick="closeSuccess()" class="mt-5 w-full bg-slate-950 text-white font-bold text-xs py-3 rounded-xl hover:bg-slate-800 transition shadow-md">
                TIẾP TỤC ĐẶT MÓN
            </button>
        </div>
    </div>

    <script>
        let menu = [];
        let cart = {}; 
        let currentCategory = "Tất cả";
        let isCartExpanded = false; // Trạng thái kiểm soát đóng mở giỏ hàng
        
        const BACKEND_URL = "https://drink-order-backend.onrender.com";

        window.addEventListener('DOMContentLoaded', () => {
            if(localStorage.getItem("customer_name")) document.getElementById("custName").value = localStorage.getItem("customer_name");
            if(localStorage.getItem("customer_phone")) document.getElementById("custPhone").value = localStorage.getItem("customer_phone");
        });

        async function loadMenu() {
            try {
                const res = await fetch(`${BACKEND_URL}/api/menu`);
                menu = await res.json();
                renderTabs();
                renderMenu();
            } catch (err) {
                document.getElementById("menuList").innerHTML = `<div class='text-center py-10 text-red-500 text-xs font-semibold'>Không thể kết nối máy chủ. Vui lòng tải lại trang!</div>`;
            }
        }

        function renderTabs() {
            const tabsBox = document.getElementById("categoryTabs");
            const categories = ["Tất cả", ...new Set(menu.map(item => item.category).filter(Boolean))];
            
            tabsBox.innerHTML = categories.map(cat => {
                const active = cat === currentCategory;
                return `
                    <button onclick="switchCategory('${cat}')" class="whitespace-nowrap px-4 py-2 rounded-xl text-xs font-bold transition-all border ${
                        active ? 'bg-green-700 text-white border-green-700 shadow-md' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'
                    }">${cat}</button>
                `;
            }).join("");
        }

        function switchCategory(cat) {
            currentCategory = cat;
            renderTabs();
            renderMenu();
        }

        function renderMenu() {
            const box = document.getElementById("menuList");
            box.innerHTML = "";

            const filteredMenu = currentCategory === "Tất cả" ? menu : menu.filter(item => item.category === currentCategory);
            const activeMenu = filteredMenu.filter(item => item.status === "Đang bán");

            if (activeMenu.length === 0) {
                box.innerHTML = `<div class="text-center py-10 text-slate-400 italic text-xs bg-slate-50 rounded-2xl border border-dashed">Hiện tại danh mục này chưa có món khả dụng.</div>`;
                return;
            }

            activeMenu.forEach(item => {
                let imgSrc = 'https://placehold.co/100';
                if (item.image) {
                    imgSrc = item.image.startsWith('http') ? item.image : `${BACKEND_URL}${item.image.startsWith('/') ? '' : '/'}${item.image}`;
                }

                // Tính tổng số lượng món này đã thêm vào giỏ hàng
                const options = cart[item.id] || [];
                const itemTotalQty = options.reduce((sum, o) => sum + o.qty, 0);

                let badgeHtml = itemTotalQty > 0 ? `<div class="absolute -top-1.5 -right-1.5 bg-green-600 text-white font-mono font-black text-[10px] w-5 h-5 rounded-full flex items-center justify-center border-2 border-white shadow-md z-10 animate-bounce">${itemTotalQty}</div>` : '';

                box.innerHTML += `
                    <div class="bg-white border border-slate-100 rounded-2xl p-3 flex gap-3 shadow-sm relative hover:border-slate-200 transition">
                        ${badgeHtml}
                        <img src="${imgSrc}" class="w-20 h-20 rounded-xl object-cover border border-slate-100 bg-slate-50 flex-shrink-0">
                        <div class="flex-1 flex flex-col justify-between py-0.5">
                            <div>
                                <h3 class="font-bold text-slate-800 text-sm leading-snug">${item.name}</h3>
                                <span class="inline-block bg-slate-100 text-slate-500 font-medium rounded-md px-1.5 py-0.5 text-[9px] mt-1">${item.category || 'Món uống'}</span>
                            </div>
                            <div class="flex justify-between items-end mt-2">
                                <span class="text-base font-black text-slate-900 font-mono">${Number(item.price).toLocaleString("vi-VN")}đ</span>
                                <button onclick="openCustom(${item.id})" class="bg-green-700 text-white font-bold text-xs px-3.5 py-2 rounded-xl shadow-md shadow-green-700/10 hover:bg-green-800 transition active:scale-95">
                                    + Chọn mua
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <div id="custom-box-${item.id}" class="hidden mt-2 bg-slate-50 border border-slate-200 rounded-2xl p-3.5 space-y-3 shadow-inner">
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-1">🍭 Mức Đường</label>
                                <select id="sugar-${item.id}" class="w-full bg-white border border-slate-200 rounded-xl p-2 text-xs outline-none font-medium focus:border-green-600">
                                    <option value="100% Đường">100% đường (Chuẩn)</option>
                                    <option value="70% Đường">70% đường (Ít ngọt)</option>
                                    <option value="50% Đường">50% đường (Ngọt vừa)</option>
                                    <option value="0% Đường">0% (Không đường)</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-1">❄️ Mức Đá</label>
                                <select id="ice-${item.id}" class="w-full bg-white border border-slate-200 rounded-xl p-2 text-xs outline-none font-medium focus:border-green-600">
                                    <option value="100% Đá">100% đá (Chuẩn)</option>
                                    <option value="70% Đá">70% đá (Ít đá)</option>
                                    <option value="50% Đá">50% đá (Đá vừa)</option>
                                    <option value="0% Không Đá">0% đá (Không đá)</option>
                                </select>
                            </div>
                        </div>
                        <div class="flex gap-2 pt-1">
                            <button onclick="closeCustom(${item.id})" class="bg-slate-200 text-slate-600 font-bold text-xs px-4 py-2.5 rounded-xl hover:bg-slate-300 transition">Hủy</button>
                            <button onclick="addToCart(${item.id})" class="flex-1 bg-green-700 text-white font-bold text-xs py-2.5 rounded-xl hover:bg-green-800 transition text-center shadow">Thêm vào giỏ hàng</button>
                        </div>
                    </div>
                `;
            });
        }

        function openCustom(id) {
            const box = document.getElementById(`custom-box-${id}`);
            if(box) box.classList.toggle("hidden");
        }
        function closeCustom(id) {
            const box = document.getElementById(`custom-box-${id}`);
            if(box) box.classList.add("hidden");
        }

        function addToCart(id) {
            const sugar = document.getElementById(`sugar-${id}`).value;
            const ice = document.getElementById(`ice-${id}`).value;

            if (!cart[id]) cart[id] = [];
            const existingOpt = cart[id].find(o => o.sugar === sugar && o.ice === ice);

            if (existingOpt) {
                existingOpt.qty += 1;
            } else {
                cart[id].push({ sugar, ice, qty: 1 });
            }

            closeCustom(id);
            // Tự động bung giỏ hàng ra cho khách xem khi vừa thêm món mới vào
            isCartExpanded = true;
            updateCartUI();
            renderMenu();
        }

        // Hàm xử lý đóng mở danh sách khi bấm vào thanh tiêu đề giỏ hàng
        function toggleCartExpand() {
            isCartExpanded = !isCartExpanded;
            const detailsBox = document.getElementById("cartDetailsBox");
            const arrow = document.getElementById("cartToggleArrow");
            
            if (isCartExpanded) {
                detailsBox.classList.remove("hidden");
                arrow.innerHTML = "Thu gọn 🔽";
            } else {
                detailsBox.classList.add("hidden");
                arrow.innerHTML = "Xem chi tiết 🔼";
            }
        }

        function updateCartUI() {
            const section = document.getElementById("cartSection");
            const listContainer = document.getElementById("cartItemsList");
            const badge = document.getElementById("cartCountBadge");
            const totalPriceEl = document.getElementById("cartTotalPrice");
            const detailsBox = document.getElementById("cartDetailsBox");
            const arrow = document.getElementById("cartToggleArrow");

            listContainer.innerHTML = "";
            let totalQty = 0;
            let totalPrice = 0;

            Object.keys(cart).forEach(itemId => {
                const item = menu.find(m => m.id == itemId);
                if (!item) return;

                cart[itemId].forEach((opt, optIndex) => {
                    if (opt.qty <= 0) return;
                    totalQty += opt.qty;
                    totalPrice += Number(item.price) * opt.qty;

                    listContainer.innerHTML += `
                        <div class="flex justify-between items-center bg-slate-50 p-2.5 rounded-xl border border-slate-100">
                            <div class="flex-1 pr-2">
                                <h4 class="font-bold text-slate-800 text-xs">${item.name}</h4>
                                <p class="text-[10px] text-slate-400 font-medium mt-0.5">🍭 ${opt.sugar} | ❄️ ${opt.ice}</p>
                            </div>
                            <div class="flex items-center gap-2">
                                <button onclick="changeQty(${itemId}, ${optIndex}, -1)" class="w-6 h-6 bg-white border border-slate-200 rounded-lg flex items-center justify-center text-xs font-bold text-slate-600 hover:bg-slate-100">-</button>
                                <span class="text-xs font-mono font-bold text-slate-800 w-4 text-center">${opt.qty}</span>
                                <button onclick="changeQty(${itemId}, ${optIndex}, 1)" class="w-6 h-6 bg-white border border-slate-200 rounded-lg flex items-center justify-center text-xs font-bold text-slate-600 hover:bg-slate-100">+</button>
                            </div>
                        </div>
                    `;
                });
            });

            badge.innerText = totalQty;
            totalPriceEl.innerText = totalPrice.toLocaleString("vi-VN") + "đ";

            // Điều khiển ẩn/hiện giỏ hàng chính dựa trên số lượng sản phẩm
            if (totalQty > 0) {
                section.classList.remove("hidden");
                if (isCartExpanded) {
                    detailsBox.classList.remove("hidden");
                    arrow.innerHTML = "Thu gọn 🔽";
                } else {
                    detailsBox.classList.add("hidden");
                    arrow.innerHTML = "Xem chi tiết 🔼";
                }
            } else {
                section.classList.add("hidden");
                isCartExpanded = false;
            }
        }

        function changeQty(itemId, optIndex, delta) {
            if (cart[itemId] && cart[itemId][optIndex]) {
                cart[itemId][optIndex].qty += delta;
                if (cart[itemId][optIndex].qty <= 0) {
                    cart[itemId].splice(optIndex, 1);
                }
                if (cart[itemId].length === 0) {
                    delete cart[itemId];
                }
            }
            updateCartUI();
            renderMenu();
        }

        async function submitOrder() {
            const customer = document.getElementById("custName").value.trim();
            const phone = document.getElementById("custPhone").value.trim();
            const note = document.getElementById("orderNote").value.trim();

            if (!customer || !phone) { 
                alert("Vui lòng điền Tên và Số điện thoại để tiệm ship nước tận nơi nhé!"); 
                return; 
            }

            let items = [];
            let total = 0;

            Object.keys(cart).forEach(itemId => {
                const item = menu.find(m => m.id == itemId);
                if (!item) return;

                const options = cart[item.id] || [];
                options.forEach(opt => {
                    if (opt.qty <= 0) return;
                    items.push({ name: item.name, qty: opt.qty, sugar: opt.sugar, ice: opt.ice });
                    total += (Number(item.price) || 0) * opt.qty;
                });
            });

            if (!items.length) { alert("Vui lòng chọn ít nhất 1 món uống!"); return; }

            try {
                const response = await fetch(`${BACKEND_URL}/api/orders`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ customer_name: customer, phone, items: JSON.stringify(items), note, total, status: "Đã nhận" })
                });

                if (!response.ok) throw new Error("Gửi đơn lỗi");
                
                localStorage.setItem("customer_name", customer);
                localStorage.setItem("customer_phone", phone);

                document.getElementById("successModal").classList.remove("hidden");
                document.getElementById("orderNote").value = "";
                cart = {};
                isCartExpanded = false;
                updateCartUI();
                renderMenu();
            } catch (error) {
                alert("Đặt món không thành công, vui lòng kiểm tra lại mạng!");
            }
        }

        function closeSuccess() { document.getElementById("successModal").classList.add("hidden"); }

        loadMenu();
    </script>
</body>

</html>
