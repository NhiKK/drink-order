<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Tiệm Nhà Mị - Đặt Món Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100">

    <div class="max-w-md mx-auto bg-white min-h-screen pb-32">
        <div class="bg-white shadow-sm">
            <div class="relative">
                <img src="assets/banner.jpg" class="w-full h-40 object-cover" onerror="this.src='https://placehold.co/600x200?text=Tiem+Nha+Mi'">
                <div class="absolute inset-0 bg-black/10"></div>
            </div>

            <div class="relative px-4 pb-4">
                <div class="flex flex-col items-center -translate-y-10">
                    <img src="assets/logo.jpg" class="w-24 h-24 rounded-full border-4 border-white bg-white shadow-lg object-cover" onerror="this.src='https://placehold.co/100'">
                    <h1 class="text-3xl font-bold text-green-700 mt-2 text-center">Tiệm Nhà Mị</h1>
                    <p class="text-pink-500 font-medium text-sm">Trà Ngon • Đậm Vị</p>
                    <p class="text-slate-500 text-xs mt-1">📍 Gò Vấp • TP Hồ Chí Minh</p>
                    <p class="text-green-600 font-bold text-sm">📞 0938 084 729</p>
                </div>
            </div>
        </div>

        <div id="trackingArea" class="hidden px-4 mb-4">
            <div class="bg-gradient-to-br from-green-50 to-emerald-50 rounded-2xl p-4 border border-green-200 shadow-sm">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="font-bold text-green-800 flex items-center gap-1">📋 Đơn hàng của bạn</h3>
                    <button onclick="refreshTracking()" class="text-xs text-green-700 bg-white border px-2 py-1 rounded-lg shadow-sm">🔄 Làm mới</button>
                </div>
                <div id="orderListStatus" class="space-y-3"></div>
            </div>
        </div>

        <div class="px-4 mb-4">
            <div class="relative flex items-center">
                <span class="absolute left-3 text-slate-400 text-sm">🔍</span>
                <input id="searchBar" type="text" oninput="handleSearch()" placeholder="Tìm kiếm món uống nhanh... Ví dụ: Cà phê" 
                    class="w-full pl-9 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:bg-white focus:ring-2 focus:ring-green-600 focus:border-transparent transition text-sm">
            </div>
        </div>

        <div id="menu" class="p-3 space-y-4"></div>

        <div class="p-4 space-y-3 border-t mt-4">
            <h3 class="font-bold text-sm text-slate-700">👤 Thông tin giao hàng:</h3>
            <input id="customer" placeholder="Tên khách hàng" class="border rounded-xl p-3 w-full outline-none focus:ring-2 focus:ring-green-600 text-sm">
            <input id="phone" placeholder="Số điện thoại" class="border rounded-xl p-3 w-full outline-none focus:ring-2 focus:ring-green-600 text-sm">
            <textarea id="orderNote" placeholder="Ghi chú chung cho toàn đơn..." class="border rounded-xl p-3 w-full outline-none focus:ring-2 focus:ring-green-600 text-sm" rows="2"></textarea>
        </div>

        <div id="cart-bar" class="fixed bottom-0 left-0 right-0 bg-white border-t shadow-[0_-4px_10px_rgba(0,0,0,0.1)] max-w-md mx-auto z-50 hidden">
            <div onclick="toggleCart()" class="bg-gray-100 p-3 flex justify-between items-center cursor-pointer font-bold text-sm text-gray-700 border-b select-none">
                <span>🛒 Giỏ hàng (<span id="cart-count" class="text-green-700">0</span> món)</span>
                <span id="cart-toggle-btn">Xem đơn ▼</span>
            </div>

            <div id="cartDetail" class="hidden max-h-60 overflow-y-auto p-4 space-y-3 bg-white"></div>

            <div class="p-4 bg-white flex items-center justify-between gap-4 border-t">
                <div>
                    <div class="text-[11px] font-medium text-slate-400 uppercase tracking-wide">Tạm tính</div>
                    <div id="total" class="font-black text-red-500 text-xl font-mono">0đ</div>
                </div>
                <button onclick="submitOrder()" class="flex-1 bg-green-700 hover:bg-green-800 transition text-white rounded-xl py-3.5 font-bold tracking-wide shadow-md active:scale-95">
                    XÁC NHẬN ĐẶT MÓN MỚI
                </button>
            </div>
        </div>
    </div>

    <div id="imageModal" onclick="closeImage()" class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-5 cursor-zoom-out">
        <img id="popupImage" class="max-w-[95vw] max-h-[85vh] rounded-2xl object-contain border-2 border-white/10 shadow-2xl">
    </div>

    <div id="successModal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-5">
        <div class="bg-white rounded-3xl p-6 w-full max-w-sm text-center shadow-xl">
            <div class="text-5xl mb-3">🎉</div>
            <div class="font-bold text-2xl text-green-700 mb-2">Đặt món thành công</div>
            <p class="text-slate-600 mb-5">Cảm ơn bạn đã ủng hộ <b>Tiệm Nhà Mị</b> ❤️</p>
            <button onclick="closeSuccess()" class="bg-green-700 text-white px-6 py-3 rounded-xl font-bold w-full hover:bg-green-800 transition">Đã hiểu</button>
        </div>
    </div>

    <script>
        let menu = [];
        let filteredMenu = []; 
        let cart = {};
        const BACKEND_URL = "https://drink-order-backend.onrender.com";

        window.addEventListener('DOMContentLoaded', () => {
            const savedName = localStorage.getItem("customer_name");
            const savedPhone = localStorage.getItem("customer_phone");
            if (savedName) document.getElementById("customer").value = savedName;
            if (savedPhone) {
                document.getElementById("phone").value = savedPhone;
                trackOrders(savedPhone);
            }
        });

        // 🌟 HÀM THEO DÕI TRẠNG THÁI ĐƠN HÀNG: ĐÃ THÊM NÚT ▼ XỔ XEM CHI TIẾT MÓN ĐÃ ĐẶT
        async function trackOrders(phone) {
            if (!phone) return;
            try {
                const res = await fetch(`${BACKEND_URL}/api/orders/track/${phone}`);
                const orders = await res.json();
                const trackingArea = document.getElementById("trackingArea");
                const orderListStatus = document.getElementById("orderListStatus");
                
                if (orders && orders.length > 0) {
                    trackingArea.classList.remove("hidden");
                    orderListStatus.innerHTML = "";
                    orders.forEach(order => {
                        let statusColor = "bg-amber-100 text-amber-800 border-amber-200";
                        if (order.status === "Đang làm") statusColor = "bg-blue-100 text-blue-800 border-blue-200";
                        if (order.status === "Đã giao" || order.status === "Hoàn tất") statusColor = "bg-green-100 text-green-800 border-green-200";
                        if (order.status === "Đã hủy") statusColor = "bg-rose-100 text-rose-800 border-rose-200";

                        // Phân rã danh sách món từ chuỗi JSON string trong database thành mảng dữ liệu công thức
                        let itemsArray = [];
                        try {
                            itemsArray = typeof order.items === 'string' ? JSON.parse(order.items) : order.items;
                        } catch(e) { console.error(e); }

                        let itemsDetailHtml = "";
                        if(Array.isArray(itemsArray)) {
                            itemsArray.forEach(subItem => {
                                itemsDetailHtml += `
                                    <div class="flex justify-between items-center text-xs text-slate-600 border-b border-slate-100 pb-1.5 pt-1.5 last:border-0">
                                        <div>
                                            <span class="font-semibold text-slate-800">${subItem.name}</span>
                                            <span class="text-[10px] text-slate-400 block">${subItem.sugar || "100% đường"} | ${subItem.ice || "100% đá"}</span>
                                        </div>
                                        <span class="font-bold text-slate-700 bg-slate-100 px-2 py-0.5 rounded font-mono">x${subItem.qty}</span>
                                    </div>
                                `;
                            });
                        }

                        // Render cấu trúc giao diện kèm khối chi tiết và nút bấm xổ xuống ▼
                        orderListStatus.innerHTML += `
                            <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                                <div onclick="toggleTrackDetail(${order.id})" class="p-3 flex justify-between items-center cursor-pointer hover:bg-slate-50 select-none transition-colors">
                                    <div class="space-y-0.5">
                                        <div class="flex items-center gap-1.5">
                                            <span class="font-bold font-mono text-slate-700 text-sm">#${order.id}</span>
                                            <span class="text-[11px] font-bold px-2 py-0.5 rounded-full border ${statusColor}">${order.status}</span>
                                        </div>
                                        <div class="text-xs text-slate-500">
                                            Tổng tiền: <span class="font-bold text-red-500 font-mono">${Number(order.total).toLocaleString("vi-VN")}đ</span>
                                        </div>
                                    </div>
                                    <span id="track-btn-${order.id}" class="text-xs font-bold text-slate-400 bg-slate-100 border px-2 py-1 rounded-lg transition-all">Xem món ▼</span>
                                </div>
                                
                                <div id="track-detail-${order.id}" class="hidden bg-slate-50/50 border-t px-3 py-1 space-y-1 max-h-40 overflow-y-auto">
                                    ${itemsDetailHtml}
                                </div>
                            </div>`;
                    });
                } else {
                    trackingArea.classList.add("hidden");
                }
            } catch (err) {
                console.error(err);
            }
        }

        // 🌟 HÀM BỔ SUNG: ĐÓNG / MỞ VÙNG XEM CHI TIẾT MÓN ĐÃ ĐẶT (KHI BẤM NÚT ▼)
        function toggleTrackDetail(orderId) {
            const detailBox = document.getElementById(`track-detail-${orderId}`);
            const btnLabel = document.getElementById(`track-btn-${orderId}`);
            
            if (detailBox.classList.contains("hidden")) {
                detailBox.classList.remove("hidden");
                btnLabel.innerText = "Thu gọn ▲";
                btnLabel.classList.remove("text-slate-400", "bg-slate-100");
                btnLabel.classList.add("text-green-700", "bg-green-50", "border-green-200");
            } else {
                detailBox.classList.add("hidden");
                btnLabel.innerText = "Xem món ▼";
                btnLabel.classList.remove("text-green-700", "bg-green-50", "border-green-200");
                btnLabel.classList.add("text-slate-400", "bg-slate-100");
            }
        }

        function refreshTracking() {
            const phone = document.getElementById("phone").value.trim();
            if (phone) trackOrders(phone);
        }

        async function loadMenu() {
            try {
                const res = await fetch(`${BACKEND_URL}/api/menu`);
                menu = await res.json();
                menu = menu.filter(x => x.status !== "Ngừng bán");

                menu.forEach(item => {
                    if (!cart[item.id]) {
                        cart[item.id] = [{ qty: 0, sugar: "100%", ice: "100%", note: "" }];
                    }
                });
                
                filteredMenu = [...menu];
                render();
            } catch (err) {
                console.error("Lỗi tải menu:", err);
            }
        }

        function handleSearch() {
            const keyword = document.getElementById("searchBar").value.trim().toLowerCase();
            if (!keyword) {
                filteredMenu = [...menu];
            } else {
                filteredMenu = menu.filter(item => 
                    (item.name && item.name.toLowerCase().includes(keyword)) ||
                    (item.category && item.category.toLowerCase().includes(keyword))
                );
            }
            render();
        }

        function render() {
            const box = document.getElementById("menu");
            box.innerHTML = "";

            if (filteredMenu.length === 0) {
                box.innerHTML = `<div class="text-center text-slate-400 text-sm py-12 italic">Không tìm thấy món uống nào phù hợp với từ khóa...</div>`;
                calc();
                return;
            }

            const categoriesMap = {};
            filteredMenu.forEach(item => {
                const catName = item.category || "Khác";
                if (!categoriesMap[catName]) categoriesMap[catName] = [];
                categoriesMap[catName].push(item);
            });

            for (const category in categoriesMap) {
                let categoryHtml = `
                    <div class="pt-4 mb-2">
                        <h2 class="text-xs font-bold text-emerald-800 bg-emerald-100 border border-emerald-200/60 px-3 py-1.5 rounded-xl w-fit uppercase tracking-wider shadow-sm">
                            📁 ${category}
                        </h2>
                    </div>
                `;

                categoriesMap[category].forEach(item => {
                    const sold = item.status === "Hết hàng";
                    const options = cart[item.id] || [{ qty: 0, sugar: "100%", ice: "100%", note: "" }];
                    const totalItemQty = options.reduce((sum, opt) => sum + opt.qty, 0);

                    let fullImgUrl = 'https://placehold.co/120?text=No+Image';
                    if (item.image) {
                        fullImgUrl = item.image.startsWith('http') ? item.image : `${BACKEND_URL}${item.image.startsWith('/') ? '' : '/'}${item.image}`;
                    }

                    let optionsHtml = "";
                    if (!sold && totalItemQty > 0) {
                        options.forEach((opt, index) => {
                            if (opt.qty <= 0) return;
                            optionsHtml += `
                            <div class="mt-2 p-3 bg-slate-50 rounded-xl border border-dashed border-slate-200">
                                <div class="flex justify-between items-center mb-2">
                                    <span class="text-[11px] font-bold text-green-700 bg-green-50 px-1.5 py-0.5 rounded">Ly #${index + 1}</span>
                                    <div class="flex items-center gap-2">
                                        <button onclick="changeOptionQty(${item.id}, ${index}, -1)" class="bg-slate-200 text-xs w-5 h-5 rounded flex items-center justify-center font-bold">-</button>
                                        <span class="text-xs font-bold font-mono">${opt.qty}</span>
                                        <button onclick="changeOptionQty(${item.id}, ${index}, 1)" class="bg-green-600 text-white text-xs w-5 h-5 rounded flex items-center justify-center font-bold">+</button>
                                    </div>
                                </div>
                                <div class="grid grid-cols-2 gap-2 text-xs">
                                    <select onchange="updateOptionField(${item.id}, ${index}, 'sugar', this.value)" class="border rounded-lg p-1.5 bg-white outline-none focus:border-green-600">
                                        <option ${opt.sugar === "100%" ? "selected" : ""}>100% đường</option>
                                        <option ${opt.sugar === "70%" ? "selected" : ""}>70% đường</option>
                                        <option ${opt.sugar === "50%" ? "selected" : ""}>50% đường</option>
                                        <option ${opt.sugar === "30%" ? "selected" : ""}>30% đường</option>
                                        <option ${opt.sugar === "0%" ? "selected" : ""}>0% đường</option>
                                    </select>
                                    <select onchange="updateOptionField(${item.id}, ${index}, 'ice', this.value)" class="border rounded-lg p-1.5 bg-white outline-none focus:border-green-600">
                                        <option ${opt.ice === "100%" ? "selected" : ""}>100% đá</option>
                                        <option ${opt.ice === "70%" ? "selected" : ""}>70% đá</option>
                                        <option ${opt.ice === "50%" ? "selected" : ""}>50% đá</option>
                                        <option ${opt.ice === "30%" ? "selected" : ""}>30% đá</option>
                                        <option ${opt.ice === "0%" ? "selected" : ""}>0% đá</option>
                                    </select>
                                </div>
                            </div>`;
                        });
                    }

                    categoryHtml += `
                    <div class="bg-white rounded-2xl border p-3 mb-2 shadow-sm">
                        <div class="flex gap-3">
                            <img src="${fullImgUrl}" onclick="showImage('${fullImgUrl}')" class="w-16 h-16 rounded-xl object-cover border cursor-pointer">
                            <div class="flex-1 flex flex-col justify-between">
                                <div>
                                    <div class="font-bold text-slate-800 text-sm">${item.name || 'Món chưa đặt tên'}</div>
                                    <div class="text-red-500 font-semibold text-sm">${Number(item.price || 0).toLocaleString("vi-VN")}đ</div>
                                </div>
                                ${sold ? `<span class="text-red-500 font-bold text-xs bg-red-50 px-2 py-0.5 rounded w-fit">HẾT HÀNG</span>` : `
                                    <div class="flex items-center gap-2">
                                        <button onclick="changeMainQty(${item.id}, -1)" class="bg-slate-200 w-6 h-6 rounded flex items-center justify-center font-bold">-</button>
                                        <span class="font-bold text-sm min-w-[12px] text-center">${totalItemQty}</span>
                                        <button onclick="changeMainQty(${item.id}, 1)" class="bg-green-600 text-white w-6 h-6 rounded flex items-center justify-center font-bold">+</button>
                                    </div>`}
                            </div>
                        </div>
                        ${optionsHtml}
                    </div>`;
                });

                box.innerHTML += categoryHtml;
            }
            calc();
        }

        function changeMainQty(id, n) {
            const options = cart[id];
            if (!options) return;
            if (n > 0) {
                if (options[options.length - 1].qty > 0) {
                    options.push({ qty: 1, sugar: "100%", ice: "100%", note: "" });
                } else {
                    options[options.length - 1].qty = 1;
                }
            } else {
                for (let i = options.length - 1; i >= 0; i--) {
                    if (options[i].qty > 0) { 
                        options[i].qty -= 1; 
                        if (options.length > 1 && options[i].qty === 0 && i === options.length - 1) {
                            options.pop();
                        }
                        break; 
                    }
                }
            }
            render();
        }

        function changeOptionQty(id, index, n) {
            if (cart[id] && cart[id][index]) {
                cart[id][index].qty += n;
                if (cart[id][index].qty < 0) cart[id][index].qty = 0;
                render();
            }
        }

        function updateOptionField(id, index, field, value) {
            if (cart[id] && cart[id][index]) {
                cart[id][index][field] = value;
                if (!document.getElementById("cartDetail").classList.contains("hidden")) {
                    renderCartDetail();
                }
            }
        }

        function showImage(src) {
            const modal = document.getElementById("imageModal");
            const img = document.getElementById("popupImage");
            if (modal && img) { img.src = src; modal.classList.remove("hidden"); }
        }
        function closeImage() { document.getElementById("imageModal").classList.add("hidden"); }

        function toggleCart() {
            const detail = document.getElementById("cartDetail");
            const btn = document.getElementById("cart-toggle-btn");
            if (detail.classList.contains("hidden")) {
                detail.classList.remove("hidden");
                btn.innerText = "Thu gọn ▲";
                renderCartDetail();
            } else {
                detail.classList.add("hidden");
                btn.innerText = "Xem đơn ▼";
            }
        }

        function renderCartDetail() {
            const detail = document.getElementById("cartDetail");
            detail.innerHTML = "";
            let hasItem = false;

            menu.forEach(item => {
                const options = cart[item.id] || [];
                options.forEach((opt, idx) => {
                    if (opt.qty > 0) {
                        hasItem = true;
                        detail.innerHTML += `
                            <div class="flex justify-between items-center bg-slate-50 p-2.5 rounded-xl border text-xs">
                                <div>
                                    <span class="font-bold text-slate-800">${item.name}</span>
                                    <span class="text-[10px] text-slate-400 block mt-0.5">(Ly #${idx + 1}: ${opt.sugar} | ${opt.ice})</span>
                                </div>
                                <div class="flex items-center gap-2 font-mono">
                                    <span class="text-slate-500">SL:</span>
                                    <span class="font-bold text-slate-800 bg-white border px-2 py-0.5 rounded shadow-sm">${opt.qty}</span>
                                </div>
                            </div>
                        `;
                    }
                });
            });

            if (!hasItem) {
                detail.innerHTML = `<div class="text-center text-slate-400 text-xs italic py-2">Giỏ hàng đang trống...</div>`;
            }
        }

        function calc() {
            let total = 0;
            let totalQty = 0;
            menu.forEach(item => {
                const options = cart[item.id] || [];
                options.forEach(opt => { 
                    total += (Number(item.price) || 0) * opt.qty; 
                    totalQty += opt.qty;
                });
            });

            document.getElementById("total").innerText = total.toLocaleString("vi-VN") + "đ";
            document.getElementById("cart-count").innerText = totalQty;

            const cartBar = document.getElementById("cart-bar");
            if (totalQty > 0) {
                cartBar.classList.remove("hidden");
                if (!document.getElementById("cartDetail").classList.contains("hidden")) {
                    renderCartDetail();
                }
            } else {
                cartBar.classList.add("hidden");
                document.getElementById("cartDetail").classList.add("hidden");
                document.getElementById("cart-toggle-btn").innerText = "Xem đơn ▼";
            }
        }

        async function submitOrder() {
            const customer = document.getElementById("customer").value.trim();
            const phone = document.getElementById("phone").value.trim();
            const note = document.getElementById("orderNote").value.trim();

            if (!customer || !phone) { alert("Vui lòng nhập Tên và Số điện thoại nhận hàng!"); return; }

            const items = [];
            let total = 0;

            menu.forEach(item => {
                const options = cart[item.id] || [];
                options.forEach(opt => {
                    if (opt.qty <= 0) return;
                    items.push({ name: item.name, qty: opt.qty, sugar: opt.sugar, ice: opt.ice });
                    total += (Number(item.price) || 0) * opt.qty;
                });
            });

            if (!items.length) { alert("Vui lòng chọn ít nhất 1 món uống!"); return; }

            try {
                const response = await fetch(`${BACKEND_URL}/api/orders`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ customer_name: customer, phone, items: JSON.stringify(items), note, total, status: "Đã nhận" })
                });

                if (!response.ok) throw new Error("Gửi đơn lỗi");
                localStorage.setItem("customer_name", customer);
                localStorage.setItem("customer_phone", phone);

                document.getElementById("successModal").classList.remove("hidden");
                document.getElementById("orderNote").value = "";
                cart = {};
                loadMenu();
                trackOrders(phone); // Cập nhật lại khung đỏ trạng thái ngay lập tức
            } catch (error) {
                alert("Đặt món không thành công, vui lòng kiểm tra lại mạng!");
            }
        }

        function closeSuccess() { document.getElementById("successModal").classList.add("hidden"); }

        loadMenu();
    </script>
</body>

</html>
