<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <title>Quản lý Menu</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-100">

    <div class="max-w-5xl mx-auto p-4">

        <div class="flex justify-between items-center mb-5">

            <h1 class="text-2xl font-bold">

                ⚙️ Quản lý Menu

            </h1>

            <button onclick="addDrink()" class="
bg-green-600
text-white
px-4
py-2
rounded-xl
">

                + Thêm món

            </button>

        </div>

        <div id="menuList" class="space-y-4">

        </div>

        <button onclick="saveMenu()" class="
mt-5
w-full
bg-blue-600
text-white
font-bold
rounded-xl
p-4
">

            LƯU MENU

        </button>

    </div>

    <script>

        let menu = []

        async function loadMenu() {

            const res =

                await fetch(
                    "/api/menu"
                )

            menu =

                await res.json()

            render()

        }

        function money(x) {

            return Number(
                x || 0
            )

                .toLocaleString(
                    "vi-VN"
                )

        }

        function render() {

            const box =

                document
                    .getElementById(
                        "menuList"
                    )

            box.innerHTML = ""

            menu.forEach(

                (item, index) => {

                    box.innerHTML += `

<div
class="
drink-card
bg-white
rounded-2xl
p-4
shadow
flex
gap-4
"
>

<div
class="
w-28
flex
flex-col
items-center
gap-2
"
>

<img

src="${
item.image||
'https://placehold.co/120'
}"

class="
w-24
h-24
rounded-xl
object-cover
border
"
>

<label

class="
bg-blue-500
text-white
rounded-lg
px-3
py-2
text-sm
cursor-pointer
text-center
block
"

>

Upload ảnh

<input

hidden

type="file"

accept="image/*"

onchange="
uploadImage(
event,
${index}
)
"

>

</label>

</div>

<div
class="
flex-1
space-y-3
"
>

<div>

<div
class="
text-sm
font-medium
mb-1
"
>

Tên món

</div>

<input

value="${item.name || ""
                        }"

oninput="
menu[
${index}
].name=
this.value
"

class="
border
rounded-lg
w-full
p-2
"

>

</div>

<div>

<div
class="
text-sm
font-medium
mb-1
"
>

Giá tiền

</div>

<input

value="
${money(
                            item.price
                        )}
"

oninput="
changePrice(
this,
${index}
)
"

class="
border
rounded-lg
w-full
p-2
"

>

</div>

<div>

<div
class="
text-sm
font-medium
mb-1
"
>

Trạng thái

</div>

<select

onchange="
menu[
${index}
].status=
this.value
"

class="
border
rounded-lg
w-full
p-2
"

>

<option
${item.status === "Đang bán" ? "selected" : ""}
>

Đang bán

</option>

<option
${item.status === "Hết hàng" ? "selected" : ""}
>

Hết hàng

</option>

<option
${item.status === "Ngừng bán" ? "selected" : ""}
>

Ngừng bán

</option>

</select>

</div>

</div>

<button

onclick="
removeDrink(
${index}
)
"

class="
bg-red-500
text-white
rounded-xl
w-10
h-10
"

>

✕

</button>

</div>

`

                })

        }


        async function uploadImage(
            event,
            index
        ) {

            const file =

                event.target.files[0]

            if (!file) {

                return

            }

            const formData =

                new FormData()

            formData.append(
                "image",
                file
            )

            try {

                const response =

                    await fetch(

                        "/api/upload",

                        {

                            method: "POST",

                            body: formData

                        }

                    )

                if (!response.ok) {

                    throw new Error(
                        "Upload thất bại"
                    )

                }

                const data =

                    await response.json()

                menu[index].image =
                    data.url

                // lấy img cùng card
                const card =

                    event.target.closest(
                        ".drink-card"
                    )

                if (card) {

                    const img =

                        card.querySelector(
                            "img"
                        )

                    if (img) {

                        img.src =
                            data.url
                    }

                }

            }
            catch (error) {

                console.error(error)

                alert(
                    "Upload ảnh thất bại"
                )

            }

        }

        function changePrice(
            el,
            index
        ) {

            const raw =

                el.value

                    .replace(
                        /\D/g,
                        ""
                    )

            menu[index]
                .price =
                Number(raw)

            el.value =

                money(raw)

        }

        function addDrink() {

            menu.unshift({

                id:
                    Date.now(),

                name: "",

                price: 0,

                image: "",

                status:
                    "Đang bán"

            })

            render()

        }

        function removeDrink(i) {

            menu.splice(
                i,
                1
            )

            render()

        }

        async function saveMenu() {

            await fetch(

                "/api/menu",

                {

                    method: "POST",

                    headers: {

                        "Content-Type":
                            "application/json"

                    },

                    body:

                        JSON.stringify(
                            menu
                        )

                }

            )

            alert(
                "Lưu thành công"
            )

        }

        loadMenu()

    </script>

</body>

</html>
