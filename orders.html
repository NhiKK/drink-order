<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Quản lý Đơn hàng - Tiệm Nhà Mị</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #16a34a; border-radius: 10px; }

        /* CẤU HÌNH BIẾN IN ẤN CHUẨN - CHỐNG BỊ TRANG TRẮNG */
        @media print {
            /* Ẩn toàn bộ giao diện web chính */
            body > *:not(#print-section) {
                display: none !important;
            }
            
            /* Ép buộc vùng in hiển thị hoàn toàn, đè lên class "hidden" */
            #print-section {
                display: block !important;
                visibility: visible !important;
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                max-width: 140mm; /* Khổ ngang A5 */
                padding: 10px;
                background: white;
                color: black;
            }

            #print-section * {
                visibility: visible !important;
            }

            /* Cấu hình trang in dọc khổ A5 */
            @page {
                size: A5 portrait;
                margin: 5mm;
            }
        }
    </style>
</head>
<body class="bg-slate-50">
    <div class="max-w-[1400px] mx-auto p-4">
        <div class="flex justify-between items-center mb-6 bg-white p-4 rounded-2xl shadow-sm no-print">
            <h1 class="text-xl font-bold text-green-700 flex items-center gap-2">
                <span class="text-2xl">📦</span> Tiệm Nhà Mị - Quản lý Đơn
            </h1>
            <div class="flex gap-3">
                <button onclick="loadOrders()" class="bg-green-600 hover:bg-green-700 text-white px-5 py-2 rounded-xl transition-all shadow-md font-medium">
                    Làm mới
                </button>
            </div>
        </div>

        <div id="orders" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 no-print">
            </div>
    </div>

    <div id="print-section" class="hidden print:block font-sans"></div>

    <script>
        async function loadOrders() {
            try {
                const res = await fetch("https://drink-order-backend.onrender.com/api/orders");
                const orders = await res.json();
                render(orders);
            } catch (err) {
                console.error("Không thể load đơn hàng");
            }
        }

        function getStatusClass(status) {
            switch(status) {
                case 'Đã nhận': return 'bg-blue-100 text-blue-700 border-blue-200';
                case 'Đang làm': return 'bg-yellow-100 text-yellow-700 border-yellow-200';
                case 'Hoàn tất': return 'bg-green-100 text-green-700 border-green-200';
                default: return 'bg-slate-100 text-slate-700 border-slate-200';
            }
        }

        function render(data) {
            const box = document.getElementById("orders");
            box.innerHTML = "";

            if (!data || !data.length) {
                box.innerHTML = `<div class="col-span-full bg-white p-10 rounded-2xl text-center text-slate-400 border-2 border-dashed border-slate-200">Chưa có đơn hàng nào</div>`;
                return;
            }

            // Lưu trữ cục bộ dữ liệu đơn hàng để dùng cho hàm in
            window.currentOrders = data;

            data.forEach(order => {
                let parsedItems = [];
                try {
                    parsedItems = typeof order.items === 'string' ? JSON.parse(order.items) : order.items;
                } catch (e) {
                    console.error("Lỗi parse JSON items cho đơn hàng #" + order.id);
                }

                let totalQty = 0;
                let itemsHtml = "";

                if (Array.isArray(parsedItems)) {
                    parsedItems.forEach(item => {
                        totalQty += Number(item.qty) || 0;
                        itemsHtml += `
                        <div class="border-b border-slate-100 last:border-none pb-2 mb-2 last:pb-0 last:mb-0">
                            <div class="flex justify-between items-start">
                                <span class="font-semibold text-slate-800 text-sm">${item.name}</span>
                                <span class="bg-green-100 text-green-800 text-xs font-bold px-2 py-0.5 rounded-md">x${item.qty}</span>
                            </div>
                            <div class="flex flex-wrap gap-1.5 mt-1 text-[11px] text-slate-500">
                                <span class="bg-slate-100 px-1.5 py-0.5 rounded">🍭 Đường: ${item.sugar}</span>
                                <span class="bg-slate-100 px-1.5 py-0.5 rounded">❄️ Đá: ${item.ice}</span>
                            </div>
                            ${item.note ? `<p class="text-[11px] text-slate-400 mt-1 italic pl-1 border-l-2 border-slate-200">📝 ${item.note}</p>` : ''}
                        </div>`;
                    });
                } else {
                    itemsHtml = `<div class="whitespace-pre-wrap text-xs text-slate-600">${order.items}</div>`;
                    totalQty = "N/A";
                }

                box.innerHTML += `
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col h-full hover:shadow-md transition-shadow">
                    <div class="p-4 flex-grow">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-xs font-mono font-bold bg-slate-100 text-slate-600 px-2 py-0.5 rounded">#${order.id}</span>
                            <div class="flex gap-1.5 items-center">
                                <button onclick="printOrder(${order.id})" class="text-slate-500 hover:text-green-600 p-1 rounded-md hover:bg-slate-100 transition-colors" title="In hóa đơn">
                                    🖨️ <span class="text-xs font-semibold">In</span>
                                </button>
                                <span class="text-[10px] font-bold px-2 py-0.5 rounded-full border ${getStatusClass(order.status)}">
                                    ${order.status || 'Đã nhận'}
                                </span>
                            </div>
                        </div>

                        <div class="mb-3">
                            <h3 class="font-bold text-slate-800 text-base leading-tight">${order.customer_name}</h3>
                            <p class="text-xs text-slate-500 mt-0.5">📞 ${order.phone}</p>
                        </div>

                        <div class="bg-slate-50 rounded-xl p-3 mb-2 max-h-48 overflow-y-auto border border-slate-100">
                            ${itemsHtml}
                        </div>

                        <div class="flex justify-between items-center bg-green-50/50 px-2.5 py-1.5 rounded-lg mb-2 text-xs border border-green-100/50">
                            <span class="text-slate-600 font-medium">Tổng số lượng món:</span>
                            <span class="font-extrabold text-green-700 text-sm">🧩 ${totalQty} ly</span>
                        </div>

                        ${order.note ? `<p class="text-[11px] text-orange-600 font-medium mb-2">📌 Ghi chú: ${order.note}</p>` : ''}
                        
                        <div class="flex justify-end items-center mt-3 pt-2 border-t border-dashed border-slate-100">
                            <span class="font-bold text-red-600 text-base">${Number(order.total).toLocaleString("vi-VN")}đ</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-3 gap-1 p-2 bg-slate-50 rounded-b-2xl border-t border-slate-100">
                        <button onclick="updateStatus(${order.id}, 'Đã nhận')" class="text-[11px] font-bold py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-lg transition-colors">Đã nhận</button>
                        <button onclick="updateStatus(${order.id}, 'Đang làm')" class="text-[11px] font-bold py-2 bg-yellow-500 hover:bg-yellow-600 text-white rounded-lg transition-colors">Đang làm</button>
                        <button onclick="updateStatus(${order.id}, 'Hoàn tất')" class="text-[11px] font-bold py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg transition-colors">Hoàn tất</button>
                    </div>
                </div>`;
            });
        }

        function printOrder(orderId) {
            if (!window.currentOrders) return;
            const order = window.currentOrders.find(o => o.id === orderId);
            if (!order) return;

            let parsedItems = [];
            try {
                parsedItems = typeof order.items === 'string' ? JSON.parse(order.items) : order.items;
            } catch (e) {}

            let itemsPrintHtml = "";
            let totalQty = 0;
            if (Array.isArray(parsedItems)) {
                parsedItems.forEach(item => {
                    totalQty += Number(item.qty) || 0;
                    itemsPrintHtml += `
                    <div style="display: flex; justify-content: space-between; border-bottom: 1px dashed #eee; padding: 6px 0; font-size: 13px;">
                        <div style="flex: 1;">
                            <b style="color:#111;">${item.name}</b>
                            <div style="font-size: 11px; color: #555; margin-top: 2px;">Đường: ${item.sugar} | Đá: ${item.ice} ${item.note ? `| Lưu ý: ${item.note}` : ''}</div>
                        </div>
                        <div style="width: 40px; text-align: right; font-weight: bold;">x${item.qty}</div>
                    </div>`;
                });
            }

            const printBox = document.getElementById("print-section");
            printBox.innerHTML = `
                <div style="text-align: center; margin-bottom: 15px; border-bottom: 2px solid #333; padding-bottom: 10px;">
                    <h2 style="margin: 0; font-size: 20px; color: #15803d;">TIỆM NHÀ MỊ</h2>
                    <p style="margin: 4px 0 0 0; font-size: 11px; color: #666;">ĐC: Gò Vấp, TP. Hồ Chí Minh • ĐT: 0938 084 729</p>
                    <h3 style="margin: 10px 0 0 0; font-size: 14px; letter-spacing: 1px;">ĐƠN HÀNG</h3>
                    <p style="margin: 2px 0 0 0; font-size: 11px; font-family: monospace;">Mã đơn: #${order.id}</p>
                </div>
                
                <div style="font-size: 12px; margin-bottom: 12px; line-height: 1.5;">
                    <div><b>Khách hàng:</b> ${order.customer_name}</div>
                    <div><b>Điện thoại:</b> ${order.phone}</div>
                    <div><b>Thời gian:</b> ${new Date().toLocaleString('vi-VN')}</div>
                    ${order.note ? `<div><b>Ghi chú đơn:</b> <span style="color: #c2410c;">${order.note}</span></div>` : ''}
                </div>

                <div style="border-top: 1px solid #333; border-bottom: 1px solid #333; padding: 4px 0; font-weight: bold; display: flex; justify-content: space-between; font-size: 12px; background: #f9f9f9;">
                    <span>Tên món uống</span>
                    <span style="width: 40px; text-align: right;">SL</span>
                </div>
                
                <div style="margin-bottom: 15px;">
                    ${itemsPrintHtml}
                </div>

                <div style="text-align: right; font-size: 13px; line-height: 1.6; border-top: 1px solid #333; padding-top: 6px;">
                    <div>Tổng số lượng: <b>${totalQty} ly</b></div>
                    <div style="font-size: 16px; margin-top: 4px;">Thành tiền: <b style="color: #dc2626;">${Number(order.total).toLocaleString("vi-VN")}đ</b></div>
                </div>

                <div style="text-align: center; margin-top: 25px; font-size: 11px; font-style: italic; color: #555; border-top: 1px dashed #ccc; padding-top: 10px;">
                    Cảm ơn quý khách đã ủng hộ Tiệm Nhà Mị! ❤️
                </div>
            `;

            // Kích hoạt lệnh in hệ thống
            window.print();
        }

        async function updateStatus(id, status) {
            await fetch(`https://drink-order-backend.onrender.com/api/orders/${id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ status })
            });
            loadOrders();
        }

        loadOrders();
        setInterval(loadOrders, 10000);
    </script>
</body>
</html>
