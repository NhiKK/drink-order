<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Quản lý Đơn hàng - Tiệm Nhà Mị</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }

        @media print {
            body > *:not(#print-section) { display: none !important; }
            #print-section {
                display: block !important; visibility: visible !important;
                position: absolute; left: 0; top: 0; width: 100%;
                max-width: 140mm; padding: 10px; background: white; color: black;
            }
        }
    </style>
</head>
<body class="bg-[#f8fafc] text-[#1e293b] font-sans antialiased">

    <div id="authOverlay" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-2xl max-w-sm w-full text-center shadow-xl border border-slate-200">
            <div class="text-3xl mb-2">🔒</div>
            <h2 class="text-lg font-black text-slate-900 uppercase tracking-tight">Hệ Thống Đơn Hàng</h2>
            <p class="text-slate-400 text-xs mt-1 mb-4">Vui lòng nhập mật khẩu quản trị để tiếp tục</p>
            <input id="passwordInput" type="password" placeholder="Nhập mật khẩu..." 
                class="w-full text-center border border-slate-300 rounded-xl p-3 text-sm outline-none focus:border-slate-900 font-mono mb-3"
                onkeypress="if(event.key === 'Enter') checkAuth()">
            <button onclick="checkAuth()" class="w-full bg-slate-900 text-white font-bold text-xs py-3 rounded-xl hover:bg-slate-800 transition">
                XÁC NHẬN ĐĂNG NHẬP
            </button>
        </div>
    </div>

    <div id="mainContent" class="hidden max-w-6xl mx-auto pb-24">
        
        <div class="bg-white shadow-sm mb-6 rounded-b-2xl overflow-hidden border-b border-slate-200">
            <div class="relative">
                <img src="assets/banner.jpg" class="w-full h-32 object-cover" onerror="this.src='https://placehold.co/1200x300?text=Tiem+Nha+Mi+Banner'">
                <div class="absolute inset-0 bg-black/5"></div>
            </div>

            <div class="px-6 pb-4 relative flex flex-col sm:flex-row items-center sm:items-end justify-between gap-4 -translate-y-6 sm:translate-y-0 sm:mt-[-30px]">
                <div class="flex flex-col sm:flex-row items-center gap-4 text-center sm:text-left">
                    <img src="assets/logo.jpg" class="w-20 h-20 rounded-full border-4 border-white bg-white shadow-md object-cover relative z-10" onerror="this.src='https://placehold.co/150'">
                    <div class="sm:mb-2">
                        <h1 class="text-xl font-black tracking-tight text-slate-900 uppercase">Hệ Thống Đơn Hàng</h1>
                    </div>
                </div>
                <div class="sm:mb-2 flex gap-2">
                    <button onclick="logout()" class="bg-slate-200 text-slate-700 font-bold text-xs px-3 py-2.5 rounded-xl hover:bg-slate-300 transition">🚪 Đăng xuất</button>
                    <button onclick="loadOrders()" class="bg-slate-900 text-white font-bold text-xs px-5 py-2.5 rounded-xl hover:bg-slate-800 active:scale-95 transition shadow-sm">🔄 LÀM MỚI ĐƠN</button>
                </div>
            </div>
        </div>

        <div class="px-4 md:px-6 space-y-3" id="orderGroupsContainer"></div>

    </div>

    <div id="print-section" class="hidden"></div>

    <script>
        // CÀI ĐẶT MẬT KHẨU TẠI ĐÂY (Bạn có thể đổi tùy ý)
        const ADMIN_PASSWORD = "hcm,2026"; 
        let allOrders = [];
        
        const GROUP_CONFIGS = [
            { id: "group-new", title: "💥 ĐƠN MỚI (CHỜ LÀM)", statuses: ["Đã nhận", "Đã tiếp nhận"], defaultOpen: true, headerBg: "bg-slate-900", textBg: "text-white" },
            { id: "group-processing", title: "⏳ ĐANG PHA CHẾ", statuses: ["Đang làm", "Đang pha chế"], defaultOpen: true, headerBg: "bg-slate-700", textBg: "text-white" },
            { id: "group-completed", title: "✅ ĐÃ HOÀN TẤT", statuses: ["Đã giao", "Hoàn tất"], defaultOpen: false, headerBg: "bg-slate-200", textBg: "text-slate-700" },
            { id: "group-cancelled", title: "❌ ĐÃ HỦY", statuses: ["Đã hủy"], defaultOpen: false, headerBg: "bg-slate-100", textBg: "text-slate-400" }
        ];

        let groupsOpenState = {};
        GROUP_CONFIGS.forEach(g => { groupsOpenState[g.id] = g.defaultOpen; });

        // KIỂM TRA MẬT KHẨU KHI MỞ TRANG
        window.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem("is_admin_authenticated") === "true") {
                document.getElementById("authOverlay").classList.add("hidden");
                document.getElementById("mainContent").classList.remove("hidden");
                loadMenu();
            }
        });

        function checkAuth() {
            const input = document.getElementById("passwordInput").value;
            if (input === ADMIN_PASSWORD) {
                localStorage.setItem("is_admin_authenticated", "true");
                document.getElementById("authOverlay").classList.add("hidden");
                document.getElementById("mainContent").classList.remove("hidden");
                loadMenu();
            } else {
                alert("❌ Mật khẩu không chính xác, vui lòng thử lại!");
            }
        }

        function logout() {
            localStorage.removeItem("is_admin_authenticated");
            location.reload();
        }

        async function loadOrders() {
            try {
                const res = await fetch("https://drink-order-backend.onrender.com/api/orders");
                allOrders = await res.json();
                renderGroupedOrders();
            } catch (err) {
                console.error("Lỗi tải đơn:", err);
            }
        }

        function renderGroupedOrders() {
            const container = document.getElementById("orderGroupsContainer");
            container.innerHTML = "";

            GROUP_CONFIGS.forEach(group => {
                const ordersInGroup = allOrders.filter(order => group.statuses.includes(order.status));
                const isOpen = groupsOpenState[group.id];

                let groupHtml = `
                    <div class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
                        <div onclick="toggleGroup('${group.id}')" class="flex justify-between items-center px-4 py-3 ${group.headerBg} ${group.textBg} cursor-pointer select-none text-xs font-bold tracking-wider">
                            <span>${group.title} (${ordersInGroup.length})</span>
                            <span class="text-[10px] transition-transform duration-200 ${isOpen ? 'rotate-180' : ''}">▼</span>
                        </div>
                        
                        <div id="${group.id}" class="${isOpen ? 'block' : 'hidden'} p-3 bg-[#fdfdfd] space-y-2">
                `;

                if (ordersInGroup.length === 0) {
                    groupHtml += `<div class="text-center text-xs text-slate-400 py-4 italic">Không có đơn hàng.</div>`;
                } else {
                    ordersInGroup.forEach(order => {
                        let parsedItems = [];
                        try { parsedItems = typeof order.items === 'string' ? JSON.parse(order.items) : order.items; } catch(e) {}

                        let itemsHtml = parsedItems.map(it => `
                            <div class="flex justify-between items-center border-b border-slate-100 py-2 last:border-0 last:py-0">
                                <div class="flex-1 pr-4">
                                    <div class="text-base font-extrabold text-black uppercase tracking-tight">${it.name}</div>
                                    <div class="text-xs text-slate-500 mt-0.5 font-medium">
                                        🍭 ${it.sugar || '100%'} đường &nbsp;|&nbsp; ❄️ ${it.ice || '100%'} đá
                                    </div>
                                </div>
                                <div class="text-lg font-black text-slate-900 bg-slate-100 px-3 py-1 rounded-md border border-slate-200 font-mono">
                                    x${it.qty}
                                </div>
                            </div>
                        `).join("");

                        let timeString = "";
                        if(order.created_at) {
                            const date = new Date(order.created_at);
                            timeString = date.toLocaleTimeString("vi-VN", {hour: '2-digit', minute:'2-digit'});
                        }

                        groupHtml += `
                            <div class="bg-white border border-slate-200 rounded-lg p-4 flex flex-col md:flex-row md:items-center justify-between gap-4">
                                <div class="md:w-1/4 space-y-0.5">
                                    <div class="flex items-center gap-2">
                                        <span class="text-xs font-mono font-bold text-slate-400">#${order.id}</span>
                                        <h3 class="font-bold text-sm text-slate-900 truncate">${order.customer_name}</h3>
                                    </div>
                                    <p class="text-xs text-slate-600 font-medium">📞 ${order.phone}</p>
                                    <p class="text-[10px] text-slate-400 font-mono">Giờ đặt: ${timeString}</p>
                                </div>

                                <div class="md:w-5/12 bg-white p-3 rounded-lg border border-slate-300/80 space-y-2.5 shadow-sm">
                                    ${itemsHtml}
                                    ${order.note ? `<div class="text-xs bg-slate-100 text-slate-800 p-2 rounded border border-slate-200 font-bold mt-1">📌 GHI CHÚ: ${order.note}</div>` : ""}
                                </div>

                                <div class="md:w-1/3 flex flex-row md:flex-col items-center md:items-end justify-between md:justify-center gap-3">
                                    <div class="text-left md:text-right">
                                        <span class="text-[10px] block font-medium text-slate-400">Tổng thanh toán</span>
                                        <span class="font-bold text-slate-900 text-base font-mono">${Number(order.total).toLocaleString("vi-VN")}đ</span>
                                    </div>
                                    
                                    <div class="flex items-center gap-2">
                                        <select onchange="updateStatus(${order.id}, this.value)" class="text-xs font-bold bg-white border border-slate-300 rounded-md p-1.5 outline-none focus:border-slate-500 w-32 cursor-pointer">
                                            <option value="Đã nhận" ${order.status === "Đã nhận" ? "selected" : ""}>💥 Chờ làm</option>
                                            <option value="Đang làm" ${order.status === "Đang làm" ? "selected" : ""}>⏳ Chế biến</option>
                                            <option value="Đã giao" ${order.status === "Đã giao" ? "selected" : ""}>✅ Đã xong</option>
                                            <option value="Đã hủy" ${order.status === "Đã hủy" ? "selected" : ""}>❌ Hủy đơn</option>
                                        </select>

                                        <button onclick="printBill(${order.id})" class="bg-white text-slate-700 border border-slate-300 hover:bg-slate-50 font-bold text-xs px-2.5 py-1.5 rounded-md transition active:scale-95 flex items-center gap-1">
                                            🖨️ In
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                }

                groupHtml += `</div></div>`;
                container.innerHTML += groupHtml;
            });
        }

        function toggleGroup(groupId) {
            groupsOpenState[groupId] = !groupsOpenState[groupId];
            renderGroupedOrders();
        }

        async function updateStatus(id, newStatus) {
            try {
                const response = await fetch(`https://drink-order-backend.onrender.com/api/orders/${id}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ status: newStatus })
                });
                if (response.ok) { await loadOrders(); }
            } catch (err) { console.error(err); }
        }

        function printBill(id) {
            const order = allOrders.find(x => x.id === id);
            if (!order) return;

            let parsedItems = [];
            try { parsedItems = typeof order.items === 'string' ? JSON.parse(order.items) : order.items; } catch(e) {}

            let totalQty = 0;
            let itemsPrintHtml = parsedItems.map(it => {
                totalQty += Number(it.qty || 0);
                return `
                    <div style="display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; border-bottom: 1px dashed #eee; padding-bottom: 4px;">
                        <div style="flex: 1; padding-right: 10px;">
                            <b style="color:#000; text-transform: uppercase;">${it.name}</b>
                            <div style="font-size: 11px; color: #555; margin-top: 2px;">Đường: ${it.sugar || '100%'} | Đá: ${it.ice || '100%'}</div>
                        </div>
                        <div style="width: 40px; text-align: right; font-weight: bold; font-size: 14px;">${it.qty}</div>
                    </div>`;
            }).join("");

            let timeString = "";
            if(order.created_at) {
                const date = new Date(order.created_at);
                timeString = date.toLocaleTimeString("vi-VN", {hour: '2-digit', minute:'2-digit'});
            }

            const printBox = document.getElementById("print-section");
            printBox.innerHTML = `
                <div style="text-align: center; margin-bottom: 15px;">
                    <h2 style="margin: 0; font-size: 20px; text-transform: uppercase;">Tiệm Nhà Mị</h2>
                    <p style="margin: 4px 0; font-size: 12px;">ĐC: Gò Vấp, TP. Hồ Chí Minh</p>
                    <p style="margin: 2px 0; font-size: 12px;">SĐT: 0938 084 729</p>
                    <h3 style="margin: 15px 0 5px 0; font-size: 16px; border-top: 1px dashed #333; border-bottom: 1px dashed #333; padding: 5px 0;">PHIẾU CHẾ BIẾN (#${order.id})</h3>
                    <span style="font-size: 11px; color:#666;">Thời gian: ${timeString}</span>
                </div>
                <div style="font-size: 13px; margin-bottom: 12px; line-height: 1.5;">
                    <div>Khách hàng: <b>${order.customer_name}</b></div>
                    <div>Số điện thoại: <b>${order.phone}</b></div>
                    ${order.note ? `<div style="background: #f5f5f5; padding: 4px; border: 1px solid #ddd; margin-top: 3px;"><b>Ghi chú: ${order.note}</b></div>` : ""}
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 12px; font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 4px; margin-bottom: 8px; background: #f9f9f9;">
                    <span>Tên món uống</span><span style="width: 40px; text-align: right;">SL</span>
                </div>
                <div style="margin-bottom: 15px;">${itemsPrintHtml}</div>
                <div style="text-align: right; font-size: 13px; line-height: 1.6; border-top: 1px solid #333; padding-top: 6px;">
                    <div>Tổng số lượng: <b>${totalQty} ly</b></div>
                    <div style="font-size: 16px; margin-top: 4px;">Thành tiền: <b style="color: #000;">${Number(order.total).toLocaleString("vi-VN")}đ</b></div>
                </div>
                <div style="text-align: center; margin-top: 25px; font-size: 11px; font-style: italic; color: #555; border-top: 1px dashed #ccc; padding-top: 10px;">
                    Cảm ơn quý khách đã ủng hộ Tiệm Nhà Mị! ❤️
                </div>
            `;
            window.print();
        }

        function loadMenu() {
            loadOrders();
            setInterval(loadOrders, 30000);
        }
    </script>
</body>
</html>
