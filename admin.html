<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Quản lý Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100">

    <div class="max-w-5xl mx-auto p-4">

        <div class="flex justify-between items-center mb-5">
            <h1 class="text-2xl font-bold">⚙️ Quản lý Menu</h1>
            <button onclick="addDrink()" class="bg-green-600 text-white px-4 py-2 rounded-xl font-medium shadow hover:bg-green-700 transition">
                + Thêm món
            </button>
        </div>

        <div id="menuList" class="space-y-4"></div>

        <button onclick="saveMenu()" class="mt-5 w-full bg-blue-600 text-white font-bold rounded-xl p-4 shadow-lg hover:bg-blue-700 transition">
            LƯU MENU XUỐNG DATABASE
        </button>

    </div>

    <script>
        let menu = [];

        // 1. TẢI DỮ LIỆU MENU TỪ SERVER
        async function loadMenu() {
            try {
                const res = await fetch("https://drink-order-backend.onrender.com/api/menu");
                menu = await res.json();
                render();
            } catch (err) {
                console.error("Lỗi khi tải danh sách menu:", err);
            }
        }

        // 2. ĐỊNH DẠNG ĐỒNG TIỀN VNĐ
        function money(x) {
            return Number(x || 0).toLocaleString("vi-VN");
        }

        // 3. HÀM RENDER ĐỒNG BỘ GIAO DIỆN
        function render() {
            const box = document.getElementById("menuList");
            box.innerHTML = "";

            if (!menu || menu.length === 0) {
                box.innerHTML = `<div class="text-center py-10 text-slate-400 italic bg-white rounded-2xl shadow">Menu hiện đang trống. Vui lòng bấm "+ Thêm món" để tạo mới!</div>`;
                return;
            }

            menu.forEach((item, index) => {
                box.innerHTML += `
                <div class="drink-card bg-white rounded-2xl p-4 shadow flex gap-4 border border-slate-200">
                    
                    <div class="w-28 flex flex-col items-center gap-2">
                        <img src="${item.image || 'https://placehold.co/120'}" class="w-24 h-24 rounded-xl object-cover border">
                        <label class="bg-blue-500 text-white rounded-lg px-3 py-1.5 text-xs font-medium cursor-pointer text-center block hover:bg-blue-600 transition">
                            Upload ảnh
                            <input hidden type="file" accept="image/*" onchange="uploadImage(event, ${index})">
                        </label>
                    </div>

                    <div class="flex-1 space-y-3">
                        <div>
                            <div class="text-sm font-medium text-slate-600 mb-1">Tên món</div>
                            <input type="text" value="${item.name || ''}" oninput="updateMenuField(${index}, 'name', this.value)" class="border rounded-lg w-full p-2 focus:ring-2 focus:ring-blue-400 outline-none">
                        </div>

                        <div>
                            <div class="text-sm font-medium text-slate-600 mb-1">Giá tiền (đ)</div>
                            <input type="text" value="${money(item.price)}" oninput="changePrice(this, ${index})" class="border rounded-lg w-full p-2 focus:ring-2 focus:ring-blue-400 outline-none">
                        </div>

                        <div>
                            <div class="text-sm font-medium text-slate-600 mb-1">Trạng thái hiển thị</div>
                            <select onchange="updateMenuField(${index}, 'status', this.value)" class="border rounded-lg w-full p-2 bg-white focus:ring-2 focus:ring-blue-400 outline-none">
                                <option value="Đang bán" ${item.status === "Đang bán" ? "selected" : ""}>Đang bán</option>
                                <option value="Hết hàng" ${item.status === "Hết hàng" ? "selected" : ""}>Hết hàng</option>
                                <option value="Ngừng bán" ${item.status === "Ngừng bán" ? "selected" : ""}>Ngừng bán</option>
                            </select>
                        </div>
                    </div>

                    <button onclick="removeDrink(${index})" class="bg-red-500 text-white rounded-xl w-10 h-10 font-bold hover:bg-red-600 transition flex items-center justify-center align-middle self-start shadow">
                        ✕
                    </button>
                </div>`;
            });
        }

        // 4. HÀM CẬP NHẬT TRỰC TIẾP DỮ LIỆU KHI GÕ CHỮ HOẶC THAY ĐỔI TRẠNG THÁI
        function updateMenuField(index, field, value) {
            if (menu[index]) {
                menu[index][field] = value;
            }
        }

        // 5. XỬ LÝ ĐỒNG BỘ GIÁ TIỀN
        function changePrice(el, index) {
            const raw = el.value.replace(/\D/g, "");
            if (menu[index]) {
                menu[index].price = raw ? Number(raw) : 0;
            }
            el.value = money(raw);
        }

        // 6. XỬ LÝ UPLOAD ẢNH VÀ HIỂN THỊ XEM TRƯỚC
        async function uploadImage(event, index) {
            const file = event.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append("image", file);

            try {
                const response = await fetch("https://drink-order-backend.onrender.com/api/upload", {
                    method: "POST",
                    body: formData
                });

                if (!response.ok) throw new Error("Upload thất bại");

                const data = await response.json();
                
                const fullImageUrl = data.url.startsWith('/') 
                    ? `https://drink-order-backend.onrender.com${data.url}` 
                    : data.url;

                menu[index].image = fullImageUrl;

                const card = event.target.closest(".drink-card");
                if (card) {
                    const img = card.querySelector("img");
                    if (img) img.src = fullImageUrl;
                }
            } catch (error) {
                console.error(error);
                alert("Upload ảnh thất bại!");
            }
        }

        // 7. THÊM MÓN MỚI LÊN ĐẦU DANH SÁCH (Đã fix rút ngắn ID an toàn cho kiểu INT của Postgres)
        function addDrink() {
            // Lấy 6 số cuối timestamp + 3 số ngẫu nhiên = Tạo chuỗi số 9 chữ số an toàn tuyệt đối (< 2 tỷ)
            const safeId = Number(String(Date.now()).slice(-6) + Math.floor(100 + Math.random() * 900));
            
            menu.unshift({
                id: safeId,
                name: "",
                price: 0,
                image: "",
                status: "Đang bán"
            });
            render();
        }

        // 8. XÓA TẠM THỜI MÓN KHỎI DANH SÁCH MẢNG
        function removeDrink(i) {
            if (confirm("Bạn có chắc chắn muốn xóa món này không?")) {
                menu.splice(i, 1);
                render();
            }
        }

        // 9. GỬI DỮ LIỆU ĐÃ CHUẨN HÓA LÊN BACKEND LƯU VÀO POSTGRESQL
        async function saveMenu() {
            if (menu.length === 0) {
                alert("Menu trống, không có gì để lưu!");
                return;
            }

            // Kiểm tra và làm sạch dữ liệu trước khi gửi
            for (let i = 0; i < menu.length; i++) {
                if (!menu[i].name || !menu[i].name.trim()) {
                    alert(`Lỗi: Món số ${i + 1} đang bị để trống Tên món. Vui lòng bổ sung đầy đủ thông tin!`);
                    return;
                }
                menu[i].price = menu[i].price ? Number(menu[i].price) : 0;
                menu[i].image = menu[i].image || "";
                menu[i].status = menu[i].status || "Đang bán";
            }

            try {
                const response = await fetch("https://drink-order-backend.onrender.com/api/menu", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(menu)
                });

                if (response.ok) {
                    alert("🎉 Đã lưu danh sách Menu mới xuống Database thành công!");
                    loadMenu(); 
                } else {
                    alert("❌ Lưu menu thất bại. Hãy kiểm tra lại định dạng dữ liệu!");
                }
            } catch (error) {
                console.error("Lỗi:", error);
                alert("❌ Không thể kết nối đến server Backend Render!");
            }
        }

        loadMenu();
    </script>
</body>
</html>
