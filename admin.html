<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Quản lý Menu - Tiệm Nhà Mị</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100">

    <div id="authOverlay" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-2xl max-w-sm w-full text-center shadow-xl border border-slate-200">
            <div class="text-3xl mb-2">🔐</div>
            <h2 class="text-lg font-black text-slate-900 uppercase tracking-tight">Hệ Thống Cấu Hình</h2>
            <p class="text-slate-400 text-xs mt-1 mb-4">Vui lòng nhập mật khẩu quản trị để sửa thực đơn</p>
            <input id="passwordInput" type="password" placeholder="Nhập mật khẩu..." 
                class="w-full text-center border border-slate-300 rounded-xl p-3 text-sm outline-none focus:border-slate-900 font-mono mb-3"
                onkeypress="if(event.key === 'Enter') checkAuth()">
            <button onclick="checkAuth()" class="w-full bg-slate-900 text-white font-bold text-xs py-3 rounded-xl hover:bg-slate-800 transition">
                XÁC NHẬN ĐĂNG NHẬP
            </button>
        </div>
    </div>

    <div id="mainContent" class="hidden max-w-5xl mx-auto p-4 pb-24">
        
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 mb-6 max-w-md mx-auto relative">
            <button onclick="logout()" class="absolute top-4 right-4 text-xs bg-slate-100 text-slate-600 hover:bg-slate-200 font-bold px-2.5 py-1.5 rounded-lg transition">🚪 Đăng xuất</button>
            <h3 class="font-bold text-lg text-slate-800 mb-3 flex items-center gap-2">🛠️ Quản lý Danh mục món</h3>
            <div class="flex gap-2 mb-4">
                <input id="newCategoryName" placeholder="Tên danh mục mới... VD: Trà trái cây" class="border p-2.5 rounded-xl flex-1 outline-none focus:ring-2 focus:ring-green-600 text-sm">
                <button onclick="addCategory()" class="bg-green-700 text-white px-4 rounded-xl font-bold text-sm hover:bg-green-800 transition active:scale-95">Thêm</button>
            </div>
            <div id="adminCategoryList" class="flex flex-wrap gap-2 max-h-32 overflow-y-auto p-1"></div>
        </div>

        <div class="flex justify-between items-center mb-5">
            <h1 class="text-2xl font-bold text-slate-900">⚙️ Quản lý Menu</h1>
            <button onclick="addDrink()" class="bg-green-600 text-white px-4 py-2 rounded-xl font-medium shadow hover:bg-green-700 transition">
                + Thêm món
            </button>
        </div>

        <div id="menuList" class="space-y-4"></div>

        <button onclick="saveMenu()" class="mt-6 w-full bg-blue-600 text-white font-bold rounded-xl p-4 shadow-lg hover:bg-blue-700 transition tracking-wide text-sm">
            LƯU THỰC ĐƠN XUỐNG DATABASE
        </button>

    </div>

    <script>
        // CÀI ĐẶT MẬT KHẨU TẠI ĐÂY
        const ADMIN_PASSWORD = "hcm,2026"; 
        let menu = [];
        let globalCategories = []; 
        const BACKEND_URL = "https://drink-order-backend.onrender.com";

        // KIỂM TRA ĐĂNG NHẬP KHI MỞ TRANG
        window.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem("is_admin_authenticated") === "true") {
                document.getElementById("authOverlay").classList.add("hidden");
                document.getElementById("mainContent").classList.remove("hidden");
                loadCategories();
            }
        });

        function checkAuth() {
            const input = document.getElementById("passwordInput").value;
            if (input === ADMIN_PASSWORD) {
                localStorage.setItem("is_admin_authenticated", "true");
                document.getElementById("authOverlay").classList.add("hidden");
                document.getElementById("mainContent").classList.remove("hidden");
                location.reload();
            } else {
                alert("❌ Mật khẩu không chính xác, vui lòng thử lại!");
            }
        }

        function logout() {
            localStorage.removeItem("is_admin_authenticated");
            location.reload();
        }

        // ==========================================
        // THÀNH PHẦN 1: QUẢN LÝ DANH MỤC (CATEGORIES)
        // ==========================================
        async function loadCategories() {
            try {
                const res = await fetch(`${BACKEND_URL}/api/categories`);
                globalCategories = await res.json();
                
                const listBtnBox = document.getElementById("adminCategoryList");
                if (listBtnBox) {
                    listBtnBox.innerHTML = globalCategories.map(cat => `
                        <span class="bg-slate-50 border text-slate-700 px-3 py-1.5 rounded-xl text-xs font-semibold flex items-center gap-1.5 shadow-sm">
                            ${cat.name}
                            <button onclick="deleteCategory(${cat.id})" class="text-red-500 font-bold hover:text-red-700 text-sm ml-1">×</button>
                        </span>
                    `).join("");
                }
                await loadMenu();
            } catch (err) {
                console.error("Lỗi tải danh mục:", err);
            }
        }

        async function addCategory() {
            const input = document.getElementById("newCategoryName");
            const name = input.value.trim();
            if (!name) return alert("Vui lòng nhập tên danh mục!");

            try {
                const res = await fetch(`${BACKEND_URL}/api/categories`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);

                input.value = "";
                await loadCategories(); 
            } catch (err) {
                alert(err.message);
            }
        }

        async function deleteCategory(id) {
            if (!confirm("Bạn có chắc chắn muốn xóa danh mục này không? Thao tác này không làm ảnh hưởng đến món đã gán danh mục này.")) return;
            try {
                await fetch(`${BACKEND_URL}/api/categories/${id}`, { method: "DELETE" });
                await loadCategories(); 
            } catch (err) {
                console.error("Lỗi xóa danh mục:", err);
            }
        }

        // ==========================================
        // THÀNH PHẦN 2: QUẢN LÝ MÓN ĂN (MENU)
        // ==========================================
        async function loadMenu() {
            try {
                const res = await fetch(`${BACKEND_URL}/api/menu`);
                menu = await res.json();
                render();
            } catch (err) {
                console.error("Lỗi khi tải danh sách menu:", err);
            }
        }

        function money(x) {
            return Number(x || 0).toLocaleString("vi-VN");
        }

        function render() {
            const box = document.getElementById("menuList");
            box.innerHTML = "";

            if (!menu || menu.length === 0) {
                box.innerHTML = `<div class="text-center py-10 text-slate-400 italic bg-white rounded-2xl shadow">Menu hiện đang trống. Vui lòng bấm "+ Thêm món" để tạo mới!</div>`;
                return;
            }

            menu.forEach((item, index) => {
                let imgSrc = 'https://placehold.co/120';
                if (item.image) {
                    if (item.image.startsWith('http')) {
                        imgSrc = item.image;
                    } else {
                        imgSrc = `${BACKEND_URL}${item.image.startsWith('/') ? '' : '/'}${item.image}`;
                    }
                }

                // FIX LỖI: Đồng bộ dropdown so khớp chính xác với DB
                const categoryOptionsHtml = globalCategories.map(cat => {
                    const isSelected = String(item.category).trim() === String(cat.name).trim() ? "selected" : "";
                    return `<option value="${cat.name}" ${isSelected}>${cat.name}</option>`;
                }).join("");

                box.innerHTML += `
                <div class="drink-card bg-white rounded-2xl p-4 shadow flex gap-4 border border-slate-200">
                    
                    <div class="w-28 flex flex-col items-center gap-2">
                        <img src="${imgSrc}" class="w-24 h-24 rounded-xl object-cover border">
                        <label class="bg-blue-500 text-white rounded-lg px-3 py-1.5 text-xs font-medium cursor-pointer text-center block hover:bg-blue-600 transition">
                            Upload ảnh
                            <input hidden type="file" accept="image/*" onchange="uploadImage(event, ${index})">
                        </label>
                    </div>

                    <div class="flex-1 space-y-3">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <div>
                                <div class="text-sm font-medium text-slate-600 mb-1">Tên món</div>
                                <input type="text" value="${item.name || ''}" oninput="updateMenuField(${index}, 'name', this.value)" class="border rounded-lg w-full p-2 focus:ring-2 focus:ring-blue-400 outline-none text-sm">
                            </div>

                            <div>
                                <div class="text-sm font-medium text-slate-600 mb-1">Danh mục sản phẩm</div>
                                <select onchange="updateMenuField(${index}, 'category', this.value)" class="border rounded-lg w-full p-2 bg-white focus:ring-2 focus:ring-blue-400 outline-none text-sm">
                                    <option value="" ${!item.category ? 'selected' : ''}>-- Chưa chọn danh mục --</option>
                                    ${categoryOptionsHtml}
                                </select>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <div>
                                <div class="text-sm font-medium text-slate-600 mb-1">Giá tiền (đ)</div>
                                <input type="text" value="${money(item.price)}" oninput="changePrice(this, ${index})" class="border rounded-lg w-full p-2 focus:ring-2 focus:ring-blue-400 outline-none text-sm">
                            </div>

                            <div>
                                <div class="text-sm font-medium text-slate-600 mb-1">Trạng thái hiển thị</div>
                                <select onchange="updateMenuField(${index}, 'status', this.value)" class="border rounded-lg w-full p-2 bg-white focus:ring-2 focus:ring-blue-400 outline-none text-sm">
                                    <option value="Đang bán" ${item.status === "Đang bán" ? "selected" : ""}>Đang bán</option>
                                    <option value="Hết hàng" ${item.status === "Hết hàng" ? "selected" : ""}>Hết hàng</option>
                                    <option value="Ngừng bán" ${item.status === "Ngừng bán" ? "selected" : ""}>Ngừng bán</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <button onclick="removeDrink(${index})" class="bg-red-500 text-white rounded-xl w-10 h-10 font-bold hover:bg-red-600 transition flex items-center justify-center align-middle self-start shadow">
                        ✕
                    </button>
                </div>`;
            });
        }

        function updateMenuField(index, field, value) {
            if (menu[index]) { menu[index][field] = value; }
        }

        function changePrice(el, index) {
            const raw = el.value.replace(/\D/g, "");
            if (menu[index]) { menu[index].price = raw ? Number(raw) : 0; }
            el.value = money(raw);
        }

        async function uploadImage(event, index) {
            const file = event.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append("image", file);

            try {
                const response = await fetch(`${BACKEND_URL}/api/upload`, { method: "POST", body: formData });
                if (!response.ok) throw new Error("Upload thất bại");
                const data = await response.json();
                
                menu[index].image = data.url;
                const fullImageUrl = data.url.startsWith('http') ? data.url : `${BACKEND_URL}${data.url}`;
                const card = event.target.closest(".drink-card");
                if (card) {
                    const img = card.querySelector("img");
                    if (img) img.src = fullImageUrl;
                }
                alert("Upload ảnh thành công! Đừng quên bấm 'LƯU THỰC ĐƠN XUỐNG DATABASE'.");
            } catch (error) {
                console.error(error);
                alert("Upload ảnh thất bại!");
            }
        }

        function addDrink() {
            const safeId = Number(String(Date.now()).slice(-6) + Math.floor(100 + Math.random() * 900));
            const defaultCategory = globalCategories.length > 0 ? globalCategories[0].name : "";
            menu.unshift({
                id: safeId, name: "", price: 0, image: "", category: defaultCategory, status: "Đang bán"
            });
            render();
        }

        function removeDrink(i) {
            if (confirm("Bạn có chắc chắn muốn xóa món này không?")) {
                menu.splice(i, 1);
                render();
            }
        }

        async function saveMenu() {
            if (menu.length === 0) { return alert("Menu trống, không có gì để lưu!"); }

            for (let i = 0; i < menu.length; i++) {
                if (!menu[i].name || !menu[i].name.trim()) {
                    return alert(`Lỗi: Món số ${i + 1} đang bị để trống Tên món!`);
                }
                if (menu[i].image && menu[i].image.includes(BACKEND_URL)) {
                    menu[i].image = menu[i].image.replace(BACKEND_URL, "");
                }
                menu[i].price = menu[i].price ? Number(menu[i].price) : 0;
                menu[i].image = menu[i].image || "";
                menu[i].category = menu[i].category || "";
                menu[i].status = menu[i].status || "Đang bán";
            }

            try {
                const response = await fetch(`${BACKEND_URL}/api/menu`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(menu)
                });

                if (response.ok) {
                    alert("🎉 Đã lưu danh sách Menu sạch xuống Database thành công!");
                    await loadCategories(); 
                } else {
                    alert("❌ Lưu menu thất bại. Hãy kiểm tra định dạng.");
                }
            } catch (error) {
                console.error("Lỗi:", error);
                alert("❌ Không thể kết nối đến server Backend Render!");
            }
        }
    </script>
</body>
</html>
